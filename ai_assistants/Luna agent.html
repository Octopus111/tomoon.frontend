<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToMoon Quant Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Markdown & Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        /* Markdown Styles */
        .markdown-body { font-size: 0.95rem; line-height: 1.6; word-break: break-word; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body pre { background-color: #1f2937; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin: 1em 0; border: 1px solid #374151; }
        .markdown-body pre.mermaid-pre { background-color: transparent; border: none; padding: 0; margin: 1em 0; }
        .markdown-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; background-color: #374151; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.85em; }
        .markdown-body pre code { background-color: transparent; padding: 0; font-size: 0.9em; border-radius: 0; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1em; padding-left: 1.5em; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1em; font-size: 0.9em; }
        .markdown-body th, .markdown-body td { border: 1px solid #374151; padding: 0.6rem; text-align: left; }
        .markdown-body th { background-color: #1f2937; font-weight: 600; }
        .markdown-body tbody tr:nth-child(even) { background-color: #21252b; }
        .markdown-body blockquote { border-left: 4px solid #4b5563; padding-left: 1rem; color: #9ca3af; margin: 0 0 1em 0; background: #282c34; padding: 0.5rem 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-body strong { font-weight: 600; color: #e5e7eb; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { font-weight: 600; margin-top: 1.5em; margin-bottom: 0.5em; color: #f3f4f6; }
        .markdown-body h1 { font-size: 1.5em; border-bottom: 1px solid #374151; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.3em; border-bottom: 1px solid #374151; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.1em; }

        textarea { resize: none; overflow-y: hidden; }
        textarea:focus { outline: none; }
        #systemPrompt { overflow-y: auto; resize: vertical; }
        
        .chat-container { display: flex; flex-direction: column; max-width: 48rem; margin: 0 auto; width: 100%; }
        .message-bubble { border-radius: 1.25rem; padding: 0.875rem 1.125rem; max-width: 100%; word-wrap: break-word; }
        .message-user { background-color: #303030; color: #ececec; border: 1px solid #424242; }
        .message-assistant { background-color: transparent; color: #e5e7eb; }
        .mermaid { background-color: #1f2937; padding: 1.5rem; border-radius: 0.5rem; margin: 1em 0; display: flex; justify-content: center; overflow-x: auto; border: 1px solid #374151; }

        .input-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem 0.25rem; border-bottom: 1px dashed #3d3d3d; margin: 0 0.5rem; }
        .deep-think-btn { font-size: 12px; display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.7rem; border-radius: 9999px; border: 1px solid #4b5563; background: linear-gradient(180deg, #2f2f2f 0%, #252525 100%); color: #9ca3af; transition: all 0.2s ease; }
        .deep-think-btn:hover { color: #e5e7eb; border-color: #6b7280; }
        .deep-think-btn.active { color: #93c5fd; border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15) inset; }
        .deep-think-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .thinking-hint { font-size: 11px; color: #6b7280; }
        
        /* Deep Thinking Box */
        .think-box { margin-bottom: 1em; border: 1px solid #374151; border-radius: 0.5rem; background-color: #1a1a1a; overflow: hidden; }
        .think-box summary { padding: 0.75rem 1rem; cursor: pointer; font-size: 0.85rem; color: #9ca3af; user-select: none; display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .think-box summary::-webkit-details-marker { display: none; }
        .think-box summary::before { content: '\f0da'; font-family: 'Font Awesome 6 Free'; font-weight: 900; transition: transform 0.2s; }
        .think-box[open] summary::before { transform: rotate(90deg); }
        .think-box[open] summary { border-bottom: 1px solid #374151; }
        .think-content { padding: 1rem; font-size: 0.9rem; color: #888; white-space: pre-wrap; line-height: 1.5; }
    </style>
</head>
<body class="bg-[#212121] text-gray-200 flex h-screen antialiased overflow-hidden">

    <!-- Sidebar -->
    <div class="w-[260px] bg-[#171717] flex-shrink-0 flex flex-col transition-all duration-300 z-20">
        <div class="p-3">
            <button onclick="newConversation()" class="w-full flex items-center justify-start gap-3 px-3 py-2.5 rounded-lg hover:bg-[#2f2f2f] transition-colors text-sm font-medium">
                <i class="fas fa-edit text-gray-400"></i> 新建对话
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-1" id="conversations">
            <!-- Conversations list injected here -->
        </div>

        <div class="p-3 border-t border-[#303030]">
            <button onclick="showSettings()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-[#2f2f2f] transition-colors text-sm text-gray-300">
                <i class="fas fa-cog text-gray-400"></i> 设置
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col relative bg-[#212121]">
        <!-- Header -->
        <header class="h-14 flex items-center justify-center border-b border-[#303030] bg-[#212121]/80 backdrop-blur-sm sticky top-0 z-10">
            <h1 class="text-base font-medium text-gray-300">ToMoon Quant Assistant</h1>
        </header>

        <!-- Chat Area -->
        <div id="chat-wrapper" class="flex-1 overflow-y-auto w-full">
            <div id="chat" class="chat-container py-8 px-4 space-y-6">
                <!-- Messages injected here -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="w-full pt-2 pb-6 px-4">
            <div class="max-w-3xl mx-auto relative rounded-2xl bg-[#2f2f2f] border border-[#424242] focus-within:border-[#525252] shadow-[0_0_15px_rgba(0,0,0,0.1)] transition-colors">
                <div class="input-toolbar">
                    <button id="deepThinkToggle" onclick="toggleDeepThink()" class="deep-think-btn hidden">
                        <i class="fas fa-brain"></i>
                        <span>深度思考</span>
                    </button>
                    <span id="thinkingHint" class="thinking-hint">当前模型未启用思考模式</span>
                </div>
                <textarea id="userInput" 
                          rows="1" 
                          placeholder="给 Luna 发送消息..." 
                          class="w-full bg-transparent px-4 py-3 pr-12 text-gray-200 max-h-[200px] overflow-y-auto text-base leading-relaxed"
                          oninput="autoResize(this)"
                          onkeydown="handleKeydown(event)"></textarea>
                <div class="absolute right-2 bottom-2">
                    <button onclick="sendMessage()" id="sendBtn" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center h-8 w-8">
                        <i class="fas fa-arrow-up text-sm"></i>
                    </button>
                </div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-500">内容由 AI 生成，请注意甄别。支持 Markdown 与 Mermaid。</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
        <div class="w-full max-w-2xl rounded-2xl shadow-2xl bg-[#171717] border border-[#303030] flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-[#303030] flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-100">偏好设置</h2>
                <button onclick="hideSettings()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 space-y-6">
                <!-- Platform Settings -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">API 设置</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1.5">API Base URL</label>
                            <input value="https://dashscope.aliyuncs.com/compatible-mode/v1" readonly
                                   class="w-full bg-[#212121] border border-[#303030] rounded-lg px-3 py-2 text-gray-500 text-sm focus:outline-none cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1.5">API Key <span class="text-red-500">*</span></label>
                            <input id="apiKey" type="password" placeholder="sk-..." 
                                   class="w-full bg-[#212121] border border-[#303030] rounded-lg px-3 py-2 text-gray-200 text-sm focus:border-[#525252] focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1.5">模型选择</label>
                            <select id="model" class="w-full bg-[#212121] border border-[#303030] rounded-lg px-3 py-2 text-gray-200 text-sm focus:border-[#525252] focus:outline-none transition-colors appearance-none">
                                <option value="qwen-plus">qwen-plus（推荐）</option>
                                <option value="qwen-plus-latest">qwen-plus-latest</option>
                                <option value="qwen-turbo">qwen-turbo</option>
                                <option value="qwen-turbo-latest">qwen-turbo-latest</option>
                                <option value="qwen-flash">qwen-flash</option>
                                <option value="qwen3-max-preview">qwen3-max-preview</option>
                                <option value="qwen3-32b">qwen3-32b</option>
                                <option value="qwen3-next-80b-a3b-thinking">qwen3-next-80b-a3b-thinking（仅思考）</option>
                                <option value="qwen2.5-72b-instruct">qwen2.5-72b-instruct（不支持）</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- System Prompt Settings -->
                <div>
                    <h3 class="text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">系统提示词 (Prompt)</h3>
                    <div>
                        <p class="text-xs text-gray-500 mb-2">配置 AI 的系统角色设定，新建对话时生效。</p>
                        <textarea id="systemPrompt" rows="12" 
                                  class="w-full bg-[#212121] border border-[#303030] rounded-lg px-3 py-2 text-gray-200 text-sm font-mono focus:border-[#525252] focus:outline-none transition-colors"></textarea>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-[#303030] flex justify-end gap-3 bg-[#171717] rounded-b-2xl">
                <button onclick="hideSettings()" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-[#2f2f2f] transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 rounded-lg text-sm font-medium bg-white text-black hover:bg-gray-200 transition-colors">保存更改</button>
            </div>
        </div>
    </div>

    <script>
        // Default System Prompt if none saved
        const DEFAULT_PROMPT = `你是 ToMoon Quant 的「资深量化投研专家 + 核心架构师」。

【核心人设与交互基调】
更像同事，不像机器人：用交易员/量化同事间的口吻，简洁、直接、可讨论。不要每轮都输出同一套模板，更不要每次都甩一张大表。
主动补洞，但不替用户拍板：你要主动发现策略缺口与交易陷阱，给出 2-3 个可选优化方向；涉及关键参数必须让用户确认。
无硬性轮次限制：持续补全逻辑，直到“策略模板”必填项齐全，或用户明确说“直接输出”。

【总目标】
将用户粗略的想法打磨成严谨可回测的架构。确认无误后，最终生成可执行三栏输出：
1. 交易员中文版
2. 程序员伪代码版
3. 后端回测 JSON`;

        // Configure Marked.js
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            if (language === 'mermaid') {
                return '<div class="mermaid">' + code + '</div>';
            }
            const validLanguage = hljs.getLanguage(language) ? language : 'plaintext';
            return '<pre><code class="hljs ' + validLanguage + '">' + 
                   hljs.highlight(code, { language: validLanguage }).value + 
                   '</code></pre>';
        };

        marked.setOptions({
            renderer: renderer,
            breaks: true,
            gfm: true
        });

        // Initialize Mermaid
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose'
        });

        // State
        let conversations = JSON.parse(localStorage.getItem('conversations')) || [];
        let currentConvId = null;
        let messages = [];
        let isGenerating = false;
        let currentController = null;
        let editingIndex = -1;
        let useDeepThinking = false;

        const HYBRID_THINKING_MODELS = [
            'qwen3-max-2026-01-23',
            'qwen3-max-preview',
            'qwen-plus',
            'qwen-plus-latest',
            'qwen-plus-2025-04-28',
            'qwen-flash',
            'qwen-flash-2025-07-28',
            'qwen-turbo',
            'qwen-turbo-latest',
            'qwen-turbo-2025-04-28',
            'qwen3-235b-a22b',
            'qwen3-32b',
            'qwen3-30b-a3b',
            'qwen3-14b',
            'qwen3-8b',
            'qwen3-4b',
            'qwen3-1.7b',
            'qwen3-0.6b'
        ];

        const THINKING_ONLY_MODELS = [
            'qwen3-next-80b-a3b-thinking',
            'qwen3-235b-a22b-thinking-2507',
            'qwen3-30b-a3b-thinking-2507'
        ];

        function getThinkingMode(modelName) {
            const model = (modelName || '').toLowerCase();
            if (!model) return 'unsupported';
            if (THINKING_ONLY_MODELS.some(name => model === name || model.startsWith(name + '-'))) {
                return 'thinking-only';
            }
            if (HYBRID_THINKING_MODELS.some(name => model === name || model.startsWith(name + '-'))) {
                return 'hybrid';
            }
            return 'unsupported';
        }

        function toggleDeepThink() {
            if (isGenerating) return;
            const model = localStorage.getItem('model') || 'qwen-plus';
            const mode = getThinkingMode(model);
            if (mode === 'thinking-only') return;

            useDeepThinking = !useDeepThinking;
            checkDeepThinkSupport();
        }

        function checkDeepThinkSupport() {
            const model = localStorage.getItem('model') || 'qwen-plus';
            const mode = getThinkingMode(model);
            const btn = document.getElementById('deepThinkToggle');
            const hint = document.getElementById('thinkingHint');

            if (mode === 'unsupported') {
                btn.classList.add('hidden');
                if (useDeepThinking) {
                    useDeepThinking = false;
                }
                if (hint) hint.textContent = '当前模型不支持深度思考';
                return;
            }

            btn.classList.remove('hidden');

            if (mode === 'thinking-only') {
                useDeepThinking = true;
                btn.disabled = true;
                btn.classList.add('active', 'opacity-70', 'cursor-not-allowed');
                btn.innerHTML = '<i class="fas fa-brain"></i><span>深度思考 (仅思考模型)</span>';
                if (hint) hint.textContent = '该模型固定为深度思考模式';
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                if (useDeepThinking) {
                    btn.classList.add('active');
                    btn.innerHTML = '<i class="fas fa-brain"></i><span>深度思考 (已开启)</span>';
                    if (hint) hint.textContent = '复杂问题建议开启，回复会更慢';
                } else {
                    btn.classList.remove('active');
                    btn.innerHTML = '<i class="fas fa-brain"></i><span>深度思考</span>';
                    if (hint) hint.textContent = '当前为快速回答模式';
                }
            }
        }

        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
            if(textarea.value === '') textarea.style.height = 'auto'; // reset
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function getSystemPrompt() {
            return localStorage.getItem('systemPrompt') || DEFAULT_PROMPT;
        }

        function saveConversations() {
            localStorage.setItem('conversations', JSON.stringify(conversations.map(c => ({
                id: c.id,
                title: c.title,
                messages: c.messages
            }))));
            renderConversations();
        }

        function newConversation() {
            currentConvId = Date.now().toString();
            messages = [{ role: "system", content: getSystemPrompt() }];
            conversations.unshift({ id: currentConvId, title: "新聊天", messages: messages });
            saveConversations();
            renderChat();
        }

        function switchConversation(id) {
            currentConvId = id;
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                messages = conv.messages;
                renderChat();
                renderConversations();
            }
        }

        function deleteConversation(e, id) {
            e.stopPropagation();
            conversations = conversations.filter(c => c.id !== id);
            if (currentConvId === id) {
                if (conversations.length > 0) {
                    switchConversation(conversations[0].id);
                } else {
                    newConversation();
                }
            } else {
                saveConversations();
            }
        }

        function renameConversation(e, id) {
            e.stopPropagation();
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                const newTitle = prompt("重命名对话", conv.title);
                if (newTitle !== null && newTitle.trim() !== "") {
                    conv.title = newTitle.trim();
                    saveConversations();
                }
            }
        }

        function renderConversations() {
            const container = document.getElementById('conversations');
            container.innerHTML = conversations.map(conv => `
                <div onclick="switchConversation('${conv.id}')" 
                     class="group flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer transition-colors ${conv.id === currentConvId ? 'bg-[#2f2f2f]' : 'hover:bg-[#212121]'}">
                    <div class="truncate text-sm text-gray-300 flex-1 pr-2">${conv.title}</div>
                    <div class="flex gap-2">
                        <button class="text-gray-500 hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" onclick="renameConversation(event, '${conv.id}')" title="重命名">
                            <i class="fas fa-edit text-xs"></i>
                        </button>
                        <button class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity" onclick="deleteConversation(event, '${conv.id}')" title="删除">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function copyMessage(role, index) {
            const displayMessages = messages.filter(m => m.role !== 'system');
            const m = displayMessages[index];
            if(m && m.content) {
                navigator.clipboard.writeText(m.content).catch(err => console.error('复制失败', err));
            }
        }

        function regenerateMessage() {
            if (isGenerating) return;
            if (messages.length < 2) return;
            const lastMsg = messages[messages.length - 1];
            if (lastMsg.role === 'assistant') {
                messages.pop(); // remove last assistant message
                renderChat();
                sendMessage(true); // send again
            }
        }

        function stopGenerating() {
            if (currentController) {
                currentController.abort();
            }
        }

        function startEdit(index) {
            if (isGenerating) return;
            editingIndex = index;
            renderChat();
            setTimeout(() => {
                const ta = document.getElementById('edit-textarea-' + index);
                if (ta) {
                    ta.focus();
                    ta.selectionStart = ta.value.length;
                    autoResize(ta);
                }
            }, 50);
        }

        function cancelEdit() {
            editingIndex = -1;
            renderChat();
        }

        function submitEdit(index) {
            const ta = document.getElementById('edit-textarea-' + index);
            if (!ta || !ta.value.trim()) return;
            
            const newText = ta.value.trim();
            editingIndex = -1;
            
            const displayMessages = messages.filter(m => m.role !== 'system');
            let trueIndex = 0;
            for (let i = 0, d = 0; i < messages.length; i++) {
                if (messages[i].role !== 'system') {
                    if (d === index) {
                        trueIndex = i;
                        break;
                    }
                    d++;
                }
            }
            
            messages = messages.slice(0, trueIndex);
            
            const input = document.getElementById('userInput');
            input.value = newText;
            sendMessage();
        }

        function toggleSendButton(generating) {
            const btn = document.getElementById('sendBtn');
            if (generating) {
                btn.innerHTML = '<i class="fas fa-stop text-sm"></i>';
                btn.onclick = stopGenerating;
                btn.classList.add('bg-red-500/80', 'hover:bg-red-500', 'animate-pulse');
                btn.classList.remove('bg-white/10', 'hover:bg-white/20');
            } else {
                btn.innerHTML = '<i class="fas fa-arrow-up text-sm"></i>';
                btn.onclick = () => sendMessage();
                btn.classList.remove('bg-red-500/80', 'hover:bg-red-500', 'animate-pulse');
                btn.classList.add('bg-white/10', 'hover:bg-white/20');
            }
        }

        function renderChat() {
            const chat = document.getElementById('chat');
            const wrapper = document.getElementById('chat-wrapper');
            
            if (messages.length <= 1) {
                chat.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-500 mt-20">
                        <div class="w-16 h-16 bg-[#2f2f2f] rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                            <i class="fas fa-robot text-2xl text-gray-400"></i>
                        </div>
                        <h2 class="text-xl font-medium text-gray-300">有什么可以帮您？</h2>
                    </div>
                `;
                return;
            }

            const displayMessages = messages.filter(m => m.role !== 'system');
            chat.innerHTML = displayMessages.map((m, index) => {
                if (m.role === 'user') {
                    if (editingIndex === index) {
                        return `
                        <div class="flex justify-end mb-6 w-full">
                            <div class="w-full max-w-2xl bg-[#2f2f2f] rounded-2xl p-4 border border-[#424242] shadow-lg">
                                <textarea id="edit-textarea-${index}" class="w-full bg-transparent text-gray-200 resize-none focus:outline-none leading-relaxed" rows="3" oninput="autoResize(this)">${m.content}</textarea>
                                <div class="flex justify-end gap-3 mt-3">
                                    <button onclick="cancelEdit()" class="px-4 py-1.5 rounded-lg text-sm font-medium text-gray-400 hover:bg-[#3a3a3a] hover:text-white transition-colors">取消</button>
                                    <button onclick="submitEdit(${index})" class="px-4 py-1.5 rounded-lg text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors">保存并发送</button>
                                </div>
                            </div>
                        </div>`;
                    }
                    return `
                        <div class="flex justify-end mb-6 group">
                            <div class="flex flex-col items-end max-w-[80%]">
                                <div class="message-bubble message-user shadow-md text-[15px] leading-relaxed">${m.content}</div>
                                <div class="flex gap-2 mt-1 px-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    ${!isGenerating ? `<button onclick="startEdit(${index})" class="text-gray-500 hover:text-gray-300 transition-colors" title="编辑"><i class="fas fa-edit text-xs"></i></button>` : ''}
                                    <button onclick="copyMessage('user', ${index})" class="text-gray-500 hover:text-gray-300 transition-colors" title="复制文本"><i class="fas fa-copy text-xs"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    let parsedHtml = '';
                    const thinkingStatus = m.thinkEnabled
                        ? (m.reasoning ? '深度思考已返回' : '已请求深度思考，未收到 reasoning_content')
                        : '快速模式';
                    parsedHtml += `<div class="text-[11px] text-gray-500 mb-2">${thinkingStatus}</div>`;
                    const shouldShowThinkingPanel = !!m.thinkEnabled;
                    if (shouldShowThinkingPanel) {
                        const reasoningText = (m.reasoning && m.reasoning.trim())
                            ? m.reasoning
                            : '_已开启深度思考，但该模型本次未返回 reasoning_content。_';
                        const reasoningHtml = marked.parse(reasoningText);
                        parsedHtml += `
                        <details class="think-box" ${isGenerating && index === displayMessages.length - 1 ? 'open' : ''}>
                            <summary>思考过程 ${m.reasoning ? '' : '(无可展示内容)'}</summary>
                            <div class="think-content">${reasoningHtml}</div>
                        </details>
                        `;
                    }
                    parsedHtml += marked.parse(m.content);
                    const isLast = index === displayMessages.length - 1;
                    const showActions = !isGenerating || !isLast;
                    return `
                        <div class="flex justify-start mb-6 w-full group">
                            <div class="w-8 h-8 rounded-full border border-[#303030] bg-[#2f2f2f] flex items-center justify-center flex-shrink-0 mr-4 mt-1">
                                <i class="fas fa-robot text-gray-400 text-xs"></i>
                            </div>
                            <div class="flex flex-col flex-1 overflow-x-hidden">
                                <div class="message-bubble message-assistant markdown-body">${parsedHtml}</div>
                                ${showActions ? `
                                <div class="flex gap-3 mt-1.5 px-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="copyMessage('assistant', ${index})" class="text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5" title="复制"><i class="fas fa-copy text-xs"></i><span class="text-[11px]">复制</span></button>
                                    ${isLast ? `<button onclick="regenerateMessage()" class="text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1.5" title="重新生成"><i class="fas fa-redo text-xs"></i><span class="text-[11px]">重新生成</span></button>` : ''}
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }
            }).join('');

            // Try rendering mermaid
            setTimeout(() => {
                const mermaids = document.querySelectorAll('.mermaid:not([data-processed="true"])');
                if (mermaids.length > 0) {
                    try {
                        mermaid.init(undefined, mermaids);
                    } catch(e) { console.error('Mermaid rendering error', e); }
                }
            }, 50);

            // Auto scroll to bottom
            wrapper.scrollTop = wrapper.scrollHeight;
        }

        async function sendMessage(isRegenerate = false) {
            if (!currentConvId || isGenerating) return;

            if (!isRegenerate) {
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                if (!text) return;

                // Reset input
                input.value = '';
                input.style.height = 'auto';

                messages.push({ role: "user", content: text });
                
                // Set Title based on first message
                const currentConv = conversations.find(c => c.id === currentConvId);
                if (currentConv && currentConv.title === '新聊天') {
                    currentConv.title = text.slice(0, 20) + (text.length > 20 ? '...' : '');
                    saveConversations();
                }
            }

            renderChat();

            const apiKey = localStorage.getItem('apiKey');
            const model = localStorage.getItem('model') || 'qwen-plus';

            if (!apiKey) {
                messages.push({ role: "assistant", content: "⚠️ 请先在左侧边栏底部的「设置」中配置您的 API Key。" });
                renderChat();
                return;
            }

            // Generating State
            isGenerating = true;
            toggleSendButton(true);
            currentController = new AbortController();

            // Thinking placeholder
            const thinkingId = 'thinking-' + Date.now();
            const chat = document.getElementById('chat');
            const wrapper = document.getElementById('chat-wrapper');
            const thinkingMode = getThinkingMode(model);
            const thinkingEnabledForRequest = thinkingMode === 'thinking-only' || (thinkingMode === 'hybrid' && !!useDeepThinking);
            
            chat.innerHTML += `
                <div id="${thinkingId}" class="flex justify-start mb-6 w-full">
                    <div class="w-8 h-8 rounded-full border border-[#303030] bg-[#2f2f2f] flex items-center justify-center flex-shrink-0 mr-4 mt-1">
                        <i class="fas fa-robot text-gray-400 text-xs"></i>
                    </div>
                    <div class="message-bubble message-assistant text-gray-500 flex items-center gap-2">
                        <i class="fas fa-circle-notch fa-spin"></i> ${thinkingEnabledForRequest ? '深度思考中...' : '思考中...'}
                    </div>
                </div>
            `;
            wrapper.scrollTop = wrapper.scrollHeight;

            try {
                const requestBody = {
                    model: model,
                    messages: messages.map(m => ({ role: m.role, content: m.content })),
                    stream: true,
                    stream_options: {
                        include_usage: true
                    }
                };

                if (thinkingMode === 'hybrid') {
                    // HTTP direct call uses top-level enable_thinking.
                    requestBody.enable_thinking = !!useDeepThinking;
                }

                const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    signal: currentController.signal,
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMsg = { role: "assistant", content: "", reasoning: "", thinkEnabled: thinkingEnabledForRequest };
                messages.push(assistantMsg);
                
                document.getElementById(thinkingId).remove();

                let sseBuffer = '';
                let streamEnded = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    sseBuffer += decoder.decode(value, { stream: true });
                    const lines = sseBuffer.split('\n');
                    sseBuffer = lines.pop() || '';

                    for (const rawLine of lines) {
                        const line = rawLine.trim();
                        if (!line || !line.startsWith('data:')) continue;

                        const dataStr = line.slice(5).trim();
                        if (dataStr === '[DONE]') {
                            streamEnded = true;
                            break;
                        }

                        try {
                            const data = JSON.parse(dataStr);
                            const delta = data.choices?.[0]?.delta || {};

                            if (delta.reasoning_content) {
                                assistantMsg.reasoning += delta.reasoning_content;
                            }
                            if (delta.content) {
                                assistantMsg.content += delta.content;
                            }
                            renderChat();
                        } catch (e) {
                            console.warn("Parse stream chunk error", e, line);
                        }
                    }

                    if (streamEnded) break;
                }

                const trailing = sseBuffer.trim();
                if (trailing.startsWith('data:')) {
                    const dataStr = trailing.slice(5).trim();
                    if (dataStr && dataStr !== '[DONE]') {
                        try {
                            const data = JSON.parse(dataStr);
                            const delta = data.choices?.[0]?.delta || {};
                            if (delta.reasoning_content) assistantMsg.reasoning += delta.reasoning_content;
                            if (delta.content) assistantMsg.content += delta.content;
                            renderChat();
                        } catch (e) {
                            console.warn("Parse trailing stream chunk error", e, trailing);
                        }
                    }
                }
            } catch (err) {
                const el = document.getElementById(thinkingId);
                if(el) el.remove();
                
                if (err.name === 'AbortError') {
                    if (messages.length > 0 && messages[messages.length - 1].role === 'assistant') {
                        messages[messages.length - 1].content += '\n\n*[已中止输出]*';
                    }
                } else {
                    messages.push({ role: "assistant", content: `❌ 请求失败: ${err.message}` });
                }
                renderChat();
            } finally {
                isGenerating = false;
                toggleSendButton(false);
                currentController = null;
                renderChat(); // Final render to show action buttons
                saveConversations();
            }
        }

        // Settings Modal Management
        const settingsModal = document.getElementById('settingsModal');
        
        function showSettings() {
            document.getElementById('apiKey').value = localStorage.getItem('apiKey') || '';
            document.getElementById('model').value = localStorage.getItem('model') || 'qwen-plus';
            document.getElementById('systemPrompt').value = getSystemPrompt();
            
            settingsModal.classList.remove('hidden');
            // Small timeout to allow display:block to apply before animating opacity
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
            }, 10);
        }

        function hideSettings() {
            settingsModal.classList.add('opacity-0');
            setTimeout(() => {
                settingsModal.classList.add('hidden');
            }, 200);
        }

        function saveSettings() {
            localStorage.setItem('apiKey', document.getElementById('apiKey').value);
            localStorage.setItem('model', document.getElementById('model').value);
            localStorage.setItem('systemPrompt', document.getElementById('systemPrompt').value);
            
            // Update current system prompt if we are in a new conversation
            if (messages.length === 1 && messages[0].role === 'system') {
                messages[0].content = document.getElementById('systemPrompt').value;
            }
            
            saveConversations();
            hideSettings();
            checkDeepThinkSupport();
        }

        // Bootstrap
        if (conversations.length === 0) {
            newConversation();
        } else {
            currentConvId = conversations[0].id;
            switchConversation(currentConvId);
        }
        checkDeepThinkSupport();
    </script>
</body>
</html>
