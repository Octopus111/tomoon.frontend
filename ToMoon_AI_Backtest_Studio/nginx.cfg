#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    
    # HTTP 服务器配置 - 重定向到HTTPS
    server {
        listen       80;
        server_name  www.tomoon.io tomoon.io;

        # 将所有HTTP请求重定向到HTTPS
        return 301 https://$server_name$request_uri;
    }

    # HTTPS 服务器配置
    server {
        listen       443 ssl;
        server_name  www.tomoon.io tomoon.io;

        # SSL 证书和私钥文件路径
        ssl_certificate      C:/nginx-1.28.0/www.tomoon.io/www.tomoon.io-chain.pem;
        ssl_certificate_key  C:/nginx-1.28.0/www.tomoon.io/www.tomoon.io-key.pem;

        # 推荐的 SSL 协议和加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # SSL 会话缓存
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        # 代理 /api/ 路径到 Flask
        location /api/ {
            proxy_pass http://127.0.0.1:8100;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect default;
            
            # 允许更大的请求体（用于上传日志文件）
            client_max_body_size 50M;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        # 代理 /public/ 路径到 Flask
        location /public/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect default;
        }

        # 代理 /auth/ 路径到 Flask（OAuth回调）
        location /auth/ {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect default;
        }

        # 服务静态HTML文件 - 指向 landingpage 目录
        location / {
            root   C:/Users/Administrator/Desktop/ToMoon_AI_Backtest_Studio/landingpage;
            index  landingpage_quant.html;
            # 默认访问首页时返回落地页
            try_files $uri $uri/ /landingpage_quant.html =404;

            access_log C:/nginx-1.28.0/logs/static_access.log;
            error_log C:/nginx-1.28.0/logs/static_error.log;
        }

        # Serve frontend static assets directly (map /static/* -> frontend/*)
        location /static/ {
            alias C:/Users/Administrator/Desktop/ToMoon_AI_Backtest_Studio/frontend/;
            try_files $uri $uri/ =404;
            access_log C:/nginx-1.28.0/logs/frontend_static_access.log;
            error_log C:/nginx-1.28.0/logs/frontend_static_error.log;
        }

        # Serve shared logo assets used by the landing page
        location /logo/ {
            alias C:/Users/Administrator/Desktop/ToMoon_AI_Backtest_Studio/logo/;
            try_files $uri $uri/ =404;
            access_log C:/nginx-1.28.0/logs/logo_access.log;
            error_log C:/nginx-1.28.0/logs/logo_error.log;
        }

        # 服务前端资源目录
        location /front_end_alpha-main/ {
            alias C:/Users/Administrator/Desktop/App/front_end_alpha-main/;
            try_files $uri $uri/ =404;
            
            access_log C:/nginx-1.28.0/logs/frontend_access.log;
            error_log C:/nginx-1.28.0/logs/frontend_error.log;
        }

        # 错误页面（可选，如果您的Flask应用不处理这些）
        # error_page  500 502 503 504  /50x.html;
        # location = /50x.html {
        #    root   html;
        # }
    }
}
