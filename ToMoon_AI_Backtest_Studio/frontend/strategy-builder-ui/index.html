<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToMoon - AI Strategy Builder</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config for Dark Mode -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Light mode (default)
            primary: '#7c3aed',
            success: '#10b981',
            warning: '#f97316',
            danger: '#ef4444',
            
            // Enhanced Dark mode - Premium deep space theme
            dark: {
              bg: '#0a0e1a',
              surface: '#0f1419',
              card: 'rgba(20, 25, 35, 0.6)',
              border: 'rgba(255, 255, 255, 0.08)',
              accent: '#3b82f6'
            }
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --left-sidebar-width: clamp(300px, 25vw, 380px);
      --right-sidebar-width: clamp(320px, 24vw, 380px);
      --canvas-left-safe-area: 0px;
      --canvas-right-safe-area: 0px;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    .canvas-safe-area {
      transition: padding-left 300ms ease, padding-right 300ms ease;
    }
    
    /* Custom scrollbar - Light mode */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Dark mode scrollbar - Enhanced */
    .dark ::-webkit-scrollbar-track {
      background: rgba(15, 20, 25, 0.5);
    }
    
    .dark ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.3), rgba(139, 92, 246, 0.3));
      border-radius: 3px;
    }
    
    .dark ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.5), rgba(139, 92, 246, 0.5));
    }
    
    /* Smooth transitions */
    .transition-all {
      transition-duration: 200ms;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Glass morphism effect - Light mode */
    .glass {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
    }
    
    /* Enhanced Glass morphism effect - Dark mode (premium deep space) */
    .dark .glass {
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    /* Premium dark mode cards with enhanced glass effect */
    .dark .bg-white {
      background: rgba(20, 25, 35, 0.6) !important;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .dark .bg-\[\#F8F7FB\] {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0f1419 100%) !important;
    }
    
    /* Node connection lines */
    .connection-line {
      position: relative;
    }
    
    .connection-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, #c084fc, #a855f7);
    }
    
    /* Theme toggle animation */
    .theme-toggle {
      transition: transform 0.3s ease;
    }
    
    .theme-toggle:hover {
      transform: rotate(15deg);
    }
    
    /* Enhanced dark mode hover effects */
    .dark .hover\:bg-slate-100:hover {
      background: rgba(59, 130, 246, 0.1) !important;
    }
    
    .dark .hover\:bg-slate-700:hover {
      background: rgba(59, 130, 246, 0.15) !important;
    }
    
    /* Premium gradient borders for dark mode */
    .dark .gradient-border {
      position: relative;
      background: rgba(20, 25, 35, 0.6);
      backdrop-filter: blur(20px);
    }
    
    .dark .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(139, 92, 246, 0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    
    /* Enhanced dark mode glow effects */
    .dark .glow-purple {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
    }
    
    .dark .glow-blue {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
    }

    /* Discover conversation transition states */
    .discover-header-collapsed {
      opacity: 0 !important;
      max-height: 0 !important;
      transform: translateY(-12px);
      pointer-events: none;
      overflow: hidden !important;
      margin: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }

    .discover-header-expanded {
      opacity: 1 !important;
      max-height: 420px !important;
      transform: translateY(0);
    }

    .discover-thread-hidden {
      opacity: 0;
      transform: translateY(8px);
      max-height: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .discover-thread-visible {
      opacity: 1;
      transform: translateY(0);
      max-height: 9999px;
      pointer-events: auto;
    }
  </style>
</head>
<body class="h-screen w-full flex bg-[#F8F7FB] dark:bg-dark-bg text-slate-800 dark:text-slate-100 overflow-hidden transition-colors duration-300">
  
  <div id="sidebar-placeholder"></div>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0">
    
    <div id="header-placeholder"></div>

    <!-- Three Column Layout -->
    <div class="flex-1 flex overflow-hidden relative">
      
      <!-- Toggle Show Button (Visible when hidden) -->
      <button id="show-sidebar-btn" onclick="toggleSidebar()" class="absolute left-0 top-4 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border p-1.5 rounded-r-lg shadow-md hidden hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-500 z-50 transition-colors">
        <i data-lucide="chevrons-right" class="w-4 h-4"></i>
      </button>

      <div id="left-panel-placeholder"></div>

      <div id="canvas-placeholder"></div>

      <!-- Toggle Show Button for Right Panel (Visible when hidden) -->
      <button id="show-right-sidebar-btn" onclick="toggleRightSidebar()" class="absolute right-0 top-4 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border p-1.5 rounded-l-lg shadow-md hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-500 z-50 transition-colors hidden">
        <i data-lucide="chevrons-left" class="w-4 h-4"></i>
      </button>

      <div id="right-panel-placeholder"></div>
    </div>
  </main>

  <div id="ai-settings-modal" class="hidden fixed inset-0 z-[100]">
    <div class="absolute inset-0 bg-black/40" onclick="closeAISettings()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="w-full max-w-lg bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl shadow-2xl overflow-hidden">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-dark-border">
          <div>
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-100">AI Settings</h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Configure AI Strategy Dialog model connection.</p>
          </div>
          <button onclick="closeAISettings()" class="p-1 rounded-md text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
        <div class="p-5 space-y-4">
          <div>
            <label for="ai-base-url-preset" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1.5">Region Base URL</label>
            <select id="ai-base-url-preset" onchange="applyBaseUrlPreset()" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/25">
              <option value="https://dashscope.aliyuncs.com/compatible-mode/v1">China (Beijing)</option>
              <option value="https://dashscope-intl.aliyuncs.com/compatible-mode/v1">Singapore</option>
              <option value="https://dashscope-us.aliyuncs.com/compatible-mode/v1">US (Virginia)</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div>
            <label for="ai-base-url" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1.5">Base URL</label>
            <input id="ai-base-url" type="text" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/25" placeholder="https://dashscope-intl.aliyuncs.com/compatible-mode/v1">
          </div>
          <div>
            <label for="ai-api-key" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1.5">API Key</label>
            <input id="ai-api-key" type="password" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/25" placeholder="sk-...">
          </div>
          <div>
            <label for="ai-model" class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1.5">Model</label>
            <input id="ai-model" type="text" class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/25" placeholder="qwen-plus">
            <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-1">Example: qwen-plus</p>
          </div>
          <p id="ai-settings-status" class="text-[11px] text-slate-500 dark:text-slate-400">Saved settings are used for realtime AI strategy dialogue calls.</p>
        </div>
        <div class="px-5 py-4 border-t border-slate-100 dark:border-dark-border flex items-center justify-end gap-2">
          <button onclick="closeAISettings()" class="px-3 py-1.5 text-sm rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800">Cancel</button>
          <button onclick="saveAISettings()" class="px-3 py-1.5 text-sm rounded-lg bg-purple-600 text-white hover:bg-purple-700">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Initialize Lucide Icons -->
  <script>
    // Theme toggle function
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      
      // Save preference to localStorage
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      
      // Refresh icons after theme change
      setTimeout(() => lucide.createIcons(), 50);
    }
    
    // Check for saved theme preference or default to light mode
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark');
    }
    
    // Initialize icons
    // lucide.createIcons(); // Moved to initApp

    // Sidebar Toggle
    function toggleSidebar() {
      if (isEmptyState) return;
      const sidebar = document.getElementById('left-sidebar');
      const showBtn = document.getElementById('show-sidebar-btn');
      
      if (sidebar.classList.contains('-translate-x-full')) {
        // Show
        sidebar.classList.remove('-translate-x-full');
        showBtn.classList.add('hidden');
      } else {
        // Hide
        sidebar.classList.add('-translate-x-full');
        showBtn.classList.remove('hidden');
      }
      syncCanvasSafeArea();
    }

    // Right Sidebar Toggle
    function toggleRightSidebar() {
      if (isEmptyState) return;
      const sidebar = document.getElementById('right-sidebar');
      const showBtn = document.getElementById('show-right-sidebar-btn');
      
      if (sidebar.classList.contains('translate-x-full')) {
        // Show
        sidebar.classList.remove('translate-x-full');
        showBtn.classList.add('hidden');
      } else {
        // Hide
        sidebar.classList.add('translate-x-full');
        showBtn.classList.remove('hidden');
      }
      syncCanvasSafeArea();
    }

    const SIDEBAR_WIDTHS = {
      discoverLeft: 'clamp(300px, 25vw, 380px)',
      structureLeft: 'clamp(360px, 30vw, 460px)',
      right: 'clamp(320px, 24vw, 380px)'
    };

    function syncCanvasSafeArea() {
      const rootStyle = document.documentElement.style;
      const leftSidebar = document.getElementById('left-sidebar');
      const rightSidebar = document.getElementById('right-sidebar');
      const leftVisible = !!leftSidebar && !leftSidebar.classList.contains('-translate-x-full') && !isEmptyState;
      const rightVisible = !!rightSidebar && !rightSidebar.classList.contains('translate-x-full') && !isEmptyState;
      const leftWidth = getWorkflowMode() === 'structure' ? SIDEBAR_WIDTHS.structureLeft : SIDEBAR_WIDTHS.discoverLeft;

      rootStyle.setProperty('--left-sidebar-width', leftWidth);
      rootStyle.setProperty('--right-sidebar-width', SIDEBAR_WIDTHS.right);
      rootStyle.setProperty('--canvas-left-safe-area', leftVisible ? leftWidth : '0px');
      rootStyle.setProperty('--canvas-right-safe-area', rightVisible ? SIDEBAR_WIDTHS.right : '0px');
    }

    // Empty State Toggle
    let isEmptyState = true;
    let isStrategyGenerating = false;
    let strategyConversation = [];
    let isDemoPrefillMode = false;
    let discoverPromptCache = null;
    let discoverLayoutState = '';
    let discoverComposerBottom = null;
    let discoverComposerPositionRaf = 0;
    const recentGuidanceClicks = {};
    const GUIDANCE_ACTION_COOLDOWN_MS = 45000;
    const strategyState = {
      strategyName: 'New Strategy',
      market: '',
      marketShort: '',
      timeframe: '',
      timeframeShort: '',
      strategyType: '',
      strategyTypeShort: '',
      edge: '',
      volatilityFilter: '',
      entryTrigger: '',
      stopLoss: '',
      takeProfit: '',
      useOwnData: false,
      economicCalendarReady: false,
      executionItems: [],
      signalLogicItems: [],
      riskMoneyItems: [],
      dataConnectionNotes: []
    };
    let discoverAttachments = [];
    let quotedModules = [];
    let hiddenBlueprintCards = new Set();
    const DEFAULT_SYSTEM_PROMPT = `You are a strategy-builder assistant. Reply naturally and contextually to the user's latest message in 1-3 sentences (do not sound like a form bot), then provide structured updates. Return one JSON object only (no markdown): {"reply":"natural user-facing reply","updates":{"market":"","marketShort":"","timeframe":"","timeframeShort":"","strategyType":"","strategyTypeShort":"","edge":"","volatilityFilter":"","entryTrigger":"","stopLoss":"","takeProfit":"","useOwnData":true,"economicCalendarReady":false,"executionItems":[{"title":"","value":"formula"}],"signalLogicItems":[{"title":"","value":"formula"}],"riskMoneyItems":[{"title":"","value":"formula"}],"dataConnectionNotes":[""]}}. Omit unknown fields.`;
    const REQUIRED_ITEMS = [
      { key: 'edge', label: 'Premise / Edge', priority: 'High' },
      { key: 'market', label: 'Market', priority: 'Medium' },
      { key: 'timeframe', label: 'Timeframe', priority: 'Medium' },
      { key: 'entryTrigger', label: 'Entry Trigger', priority: 'High' },
      { key: 'stopLoss', label: 'Stop Loss Rule', priority: 'High' },
      { key: 'takeProfit', label: 'Take Profit Rule', priority: 'High' }
    ];
    const FIELD_TO_MODULE = {
      market: 'Strategy Identity > Market',
      timeframe: 'Strategy Identity > Timeframe',
      strategyType: 'Strategy Identity > Type',
      edge: 'Premise / Edge',
      volatilityFilter: 'Market & Regime > Volatility Filter',
      entryTrigger: 'Signal Logic > Entry Trigger',
      stopLoss: 'Risk & Money > Stop Loss',
      takeProfit: 'Risk & Money > Take Profit',
      useOwnData: 'Data Connection',
      economicCalendarReady: 'Data Dependencies > Economic Calendar',
      executionItems: 'Execution',
      signalLogicItems: 'Signal Logic',
      riskMoneyItems: 'Risk & Money',
      dataConnectionNotes: 'Data Connection'
    };

    function escapeHtml(text) {
      return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeJsSingleQuoted(text) {
      return String(text || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\r?\n/g, ' ');
    }

    function getActiveComposerTextarea() {
      const mode = getWorkflowMode();
      const preferred = mode === 'discover'
        ? document.getElementById('discover-input')
        : document.getElementById('strategy-input');
      return preferred || document.getElementById('strategy-input') || document.getElementById('discover-input') || document.querySelector('textarea');
    }

    function getCurrentAIModel() {
      const savedModel = (localStorage.getItem('model') || '').trim();
      return savedModel || 'qwen-plus';
    }

    function refreshAIModelBadge() {
      const modelLabel = document.getElementById('strategy-model-label');
      if (modelLabel) modelLabel.textContent = `${getCurrentAIModel()} AI`;
    }

    function scheduleDiscoverComposerPositionUpdate(force = false) {
      if (discoverComposerPositionRaf) cancelAnimationFrame(discoverComposerPositionRaf);
      discoverComposerPositionRaf = requestAnimationFrame(() => {
        discoverComposerPositionRaf = 0;
        const welcomeHeader = document.getElementById('discover-welcome-header');
        const inputContainer = document.getElementById('discover-input-container');
        if (!welcomeHeader || !inputContainer) return;
        if (discoverLayoutState === 'active') return;

        const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
        if (!viewportHeight) return;
        const headerRect = welcomeHeader.getBoundingClientRect();
        const inputRect = inputContainer.getBoundingClientRect();
        const gapBelowHeader = viewportHeight < 760 ? 44 : 56;
        const desiredTop = headerRect.bottom + gapBelowHeader;
        const maxBottom = Math.round(viewportHeight * 0.26);
        const minBottom = viewportHeight < 760 ? 48 : 72;
        const computedBottom = viewportHeight - desiredTop - inputRect.height;
        const clampedBottom = Math.max(minBottom, Math.min(maxBottom, computedBottom));
        const nextBottom = Math.round(clampedBottom);

        if (force || discoverComposerBottom !== nextBottom) {
          discoverComposerBottom = nextBottom;
          inputContainer.style.bottom = `${nextBottom}px`;
        }
      });
    }

    function getAttachmentKind(file) {
      const type = String(file?.type || '').toLowerCase();
      const name = String(file?.name || '').toLowerCase();
      if (type.startsWith('image/')) return 'image';
      if (type.startsWith('video/')) return 'video';
      if (/\.(pdf|docx?|txt|md)$/i.test(name)) return 'document';
      if (/\.(csv|xlsx?|json)$/i.test(name)) return 'chart';
      return 'file';
    }

    function formatFileSize(size) {
      if (!size && size !== 0) return '';
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${Math.round(size / 1024)} KB`;
      return `${(size / (1024 * 1024)).toFixed(1)} MB`;
    }

    function clearDiscoverAttachments() {
      discoverAttachments.forEach((item) => {
        if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
      });
      discoverAttachments = [];
      renderDiscoverAttachments();
    }

    function handleDiscoverAttachmentFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) return;
      files.forEach((file) => {
        const kind = getAttachmentKind(file);
        discoverAttachments.push({
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: file.name,
          size: file.size,
          type: file.type,
          kind,
          previewUrl: kind === 'image' || kind === 'video' ? URL.createObjectURL(file) : ''
        });
      });
      renderDiscoverAttachments();
    }

    function renderDiscoverAttachments() {
      const list = document.getElementById('discover-attachment-list');
      const count = document.getElementById('discover-attachment-count');
      const countSmall = document.getElementById('discover-attachment-count-small');
      if (count) count.textContent = `${discoverAttachments.length} item${discoverAttachments.length === 1 ? '' : 's'}`;
      if (countSmall) countSmall.textContent = `${discoverAttachments.length}`;
      if (!list) return;
      if (!discoverAttachments.length) {
        list.innerHTML = '<div class="rounded-2xl border border-dashed border-slate-200 dark:border-dark-border bg-slate-50/70 dark:bg-slate-800/30 px-4 py-5 text-sm text-slate-400 dark:text-slate-500">No evidence attached yet.</div>';
        return;
      }
      list.innerHTML = discoverAttachments.map((item) => {
        const icon = item.kind === 'image' ? 'image' : item.kind === 'video' ? 'clapperboard' : item.kind === 'document' ? 'file-text' : item.kind === 'chart' ? 'chart-column' : 'paperclip';
        const preview = item.previewUrl && (item.kind === 'image' || item.kind === 'video')
          ? `<div class="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-slate-200 dark:border-dark-border bg-slate-100 dark:bg-slate-800"><${item.kind === 'image' ? 'img' : 'video'} src="${item.previewUrl}" ${item.kind === 'video' ? 'controls' : ''} class="w-full h-full object-cover"></${item.kind === 'image' ? 'img' : 'video'}></div>`
          : `<div class="w-14 h-14 rounded-xl flex items-center justify-center shrink-0 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-dark-border"><i data-lucide="${icon}" class="w-5 h-5 text-purple-500"></i></div>`;
        return `
          <div class="flex items-center gap-3 rounded-2xl border border-slate-200 dark:border-dark-border bg-white dark:bg-slate-900/50 px-3 py-2.5">
            ${preview}
            <div class="min-w-0 flex-1">
              <div class="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate">${escapeHtml(item.name)}</div>
              <div class="mt-0.5 text-xs text-slate-500 dark:text-slate-400">${item.kind.toUpperCase()} · ${escapeHtml(formatFileSize(item.size))}</div>
            </div>
            <button onclick="removeDiscoverAttachment('${escapeJsSingleQuoted(item.id)}')" class="shrink-0 rounded-lg p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>
        `;
      }).join('');
      setTimeout(() => lucide.createIcons(), 0);
    }

    function removeDiscoverAttachment(id) {
      const index = discoverAttachments.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [removed] = discoverAttachments.splice(index, 1);
      if (removed?.previewUrl) URL.revokeObjectURL(removed.previewUrl);
      renderDiscoverAttachments();
    }

    function enterStructureFromDiscover() {
      if (!isValidEdgeText(strategyState.edge)) {
        const button = document.getElementById('discover-enter-structure-btn');
        if (button) {
          button.classList.add('animate-pulse');
          setTimeout(() => button.classList.remove('animate-pulse'), 600);
        }
        return;
      }
      setEmptyState(false);
    }

    function buildDiscoverSynthesis() {
      const lastUser = getLastUserText();
      const edgeSummary = toEdgeSummaryText(strategyState.edge);
      const market = strategyState.marketShort || strategyState.market || 'market';
      const timeframe = strategyState.timeframeShort || strategyState.timeframe || 'timeframe';
      return {
        phenomenon: lastUser || 'Waiting for a concrete observation.',
        conditions: [market, timeframe, strategyState.volatilityFilter].filter(Boolean).join(' · ') || 'Waiting for market, timeframe, or regime clues.',
        result: strategyState.takeProfit || strategyState.entryTrigger || 'Waiting for the move you want to catch.',
        edge: edgeSummary || 'Waiting for a premise that explains why this should work.',
        failure: strategyState.stopLoss
          ? `Likely weak when ${toFormulaText(strategyState.stopLoss)} is hit or regime shifts.`
          : 'When regime changes, volatility expands, or the edge source disappears, the idea should be treated as invalid.'
      };
    }

    function splitAssistantGuidanceActions(text) {
      const raw = String(text || '').replace(/\r/g, '');
      const lines = raw.split('\n').map((s) => s.trim()).filter(Boolean);
      const askMatches = raw.match(/[^。！？!?;\n]{5,64}[？?]/g) || [];
      const asks = askMatches
        .map((s) => s.replace(/^(你好|您好|hi|hello)[,，?？\s]*/i, '').trim())
        .map((s) => s.replace(/^请告诉我[,，?？\s]*/i, '').trim())
        .filter((s) => /[？?]$/.test(s) && s.length >= 5 && s.length <= 64);
      if (asks.length) return [...new Set(asks)].slice(0, 5);
      const numbered = lines
        .map((line) => {
          const m = line.match(/^(\d+)[\)\.\s-]+(.+)$/);
          return m ? m[2].trim() : '';
        })
        .filter(Boolean);
      if (numbered.length >= 2) return numbered.slice(0, 5);
      const clauses = raw
        .split(/[。！？!?;；\n]/)
        .map((s) => s.trim())
        .filter((s) => s && /请|需|需要|确认|告诉我|补充|限定|选择|提供/.test(s));
      return clauses.slice(0, 4);
    }

    function extractDiscoverOptions(text) {
      const raw = String(text || '').replace(/\r/g, '');
      const lines = raw.split('\n').map((s) => s.trim()).filter(Boolean);
      const options = [];
      lines.forEach((line) => {
        let item = '';
        const bullet = line.match(/^[-*•]\s+(.+)$/);
        const numbered = line.match(/^\d+[\)\.\s]+(.+)$/);
        const checkbox = line.match(/^[✅☑️□]\s*(.+)$/);
        if (bullet) item = bullet[1];
        else if (numbered) item = numbered[1];
        else if (checkbox) item = checkbox[1];
        if (item) {
          item = item
            .replace(/\*\*(.*?)\*\*/g, '$1')
            .replace(/[（(][^)）]{0,40}[）)]/g, '')
            .replace(/[。；;]$/, '')
            .trim();
          if (item.length >= 6 && item.length <= 42) options.push(item);
        }
      });
      return [...new Set(options)].slice(0, 4);
    }

    function formatAssistantText(text) {
      const safe = escapeHtml(text || '');
      const withBold = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      const blocks = withBold.split(/\n{2,}/).map((b) => b.trim()).filter(Boolean);
      if (!blocks.length) return '';
      return blocks.map((b) => `<p class="mb-2 last:mb-0 whitespace-pre-line">${b}</p>`).join('');
    }

    function getLastUserText() {
      return ([...strategyConversation].reverse().find((m) => m.role === 'user')?.content || '');
    }

    function normalizeActionKey(text) {
      return String(text || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function resolveActionMode(label = '', prompt = '', mode = 'send', placeholders = '') {
      const merged = `${label} ${prompt} ${placeholders}`.toLowerCase();
      if (String(mode).toLowerCase() === 'compose') return 'compose';
      if (/_{2,}|please fill|select|example|describe|scenario|market|timeframe|symbol/.test(merged)) return 'compose';
      return 'send';
    }

    function composeToEditableTemplate(prompt, placeholders = '') {
      let text = String(prompt || '');
      const tips = String(placeholders || '').split(/[;；]+/).map((s) => s.trim()).filter(Boolean);
      let idx = 0;
      text = text.replace(/_{2,}/g, () => {
        const tip = tips[idx] || `Please fill ${idx + 1}`;
        idx += 1;
        return `【${tip}】`;
      });
      if (!/【.+?】/.test(text) && tips.length) {
        text = `${text} ${tips.map((t) => `【${t}】`).join(' ')}`;
      }
      return text.trim();
    }

    function getEditablePlaceholderRanges(text) {
      const ranges = [];
      const regex = /【([^【】]{1,60})】/g;
      let m;
      while ((m = regex.exec(text)) !== null) {
        const full = m[0];
        const start = m.index;
        ranges.push([start + 1, start + full.length - 1]);
      }
      return ranges;
    }

    function focusComposeTemplate(textarea, text) {
      const ranges = getEditablePlaceholderRanges(text);
      if (ranges.length) {
        textarea.setSelectionRange(ranges[0][0], ranges[0][1]);
      } else {
        const cursor = String(text || '').length;
        textarea.setSelectionRange(cursor, cursor);
      }
      textarea.dataset.composeTemplate = ranges.length ? '1' : '';
    }

    function jumpComposePlaceholder(textarea, backwards = false) {
      const value = textarea.value || '';
      const ranges = getEditablePlaceholderRanges(value);
      if (!ranges.length) return false;
      const start = textarea.selectionStart || 0;
      let nextIndex = 0;
      if (backwards) {
        nextIndex = ranges.findLastIndex((r) => r[0] < start);
        if (nextIndex < 0) nextIndex = ranges.length - 1;
      } else {
        nextIndex = ranges.findIndex((r) => r[0] > start);
        if (nextIndex < 0) nextIndex = 0;
      }
      textarea.setSelectionRange(ranges[nextIndex][0], ranges[nextIndex][1]);
      return true;
    }

    function getActionCooldownFiltered(actions) {
      const now = Date.now();
      return (actions || []).filter((item) => {
        const key = normalizeActionKey(item.prompt || item.label);
        return now - (recentGuidanceClicks[key] || 0) > GUIDANCE_ACTION_COOLDOWN_MS;
      }).slice(0, 3);
    }

    function onGuidanceActionClick(prompt, label = '', mode = 'send', placeholders = '') {
      const key = normalizeActionKey(prompt || label);
      if (key) recentGuidanceClicks[key] = Date.now();
      const finalMode = resolveActionMode(label, prompt, mode, placeholders);
      if (finalMode === 'compose') {
        const textarea = getActiveComposerTextarea();
        if (textarea) {
          const composeText = composeToEditableTemplate(prompt, placeholders);
          textarea.value = composeText;
          textarea.focus();
          focusComposeTemplate(textarea, composeText);
        }
        return;
      }
      setInput(prompt);
    }

    function buildGuidancePrompt(questionText) {
      const recentUserText = strategyConversation
        .filter((m) => m.role === 'user')
        .slice(-4)
        .map((m) => m.content)
        .join(' ');
      const sectorMatch = recentUserText.match(/nasdaq|sp500|dow|gold|eurusd|btc|a股|美股|港股|沪深300|中证500/i);
      const market = strategyState.market || 'A-shares';
      const timeframe = strategyState.timeframe || '30m';
      const sector = sectorMatch ? sectorMatch[0] : 'HS300';
      if (/market|symbol|品种|市场|股票/i.test(questionText)) return `Market: ${market}. Please continue to refine the edge validation.`;
      if (/timeframe|周期|分钟|日线|周线|k线/i.test(questionText)) return `Timeframe: ${timeframe}. Please suggest validation window and stats.`;
      if (/sector|industry|板块|行业|样本/i.test(questionText)) return `Sector/sample: ${sector}. Please help define boundaries.`;
      if (/idea|想法|方向|思路/i.test(questionText)) return `My idea is to find repeatable edge in ${market} ${timeframe}. Please structure it as a testable premise.`;
      if (/phenomenon|现象|观察|问题/i.test(questionText)) return `Observed phenomenon in ${market} ${timeframe}. Please convert it into an edge hypothesis.`;
      if (/entry|exit|rule|止损|止盈|入场|出场/i.test(questionText)) return 'I already have entry/exit and risk rules. Please infer the edge and give confirmation options.';
      return `Current context: market=${market}, timeframe=${timeframe}, sample=${sector}. Please continue guidance.`;
    }

    function normalizeDiscoverActions(actions) {
      if (!Array.isArray(actions)) return [];
      const output = [];
      const seen = new Set();
      actions.forEach((item) => {
        let label = '';
        let prompt = '';
        let mode = 'send';
        let placeholders = [];
        if (typeof item === 'string') {
          label = item.trim();
          prompt = buildGuidancePrompt(item.trim());
        } else if (item && typeof item === 'object') {
          label = String(item.label || item.title || item.text || '').trim();
          prompt = String(item.prompt || item.value || item.query || '').trim();
          mode = String(item.mode || 'send').toLowerCase() === 'compose' ? 'compose' : 'send';
          if (Array.isArray(item.placeholders)) placeholders = item.placeholders.map((p) => String(p || '').trim()).filter(Boolean).slice(0, 3);
          if (!prompt && label) prompt = buildGuidancePrompt(label);
          if (!label && prompt) label = prompt;
        }
        if (!label || !prompt) return;
        if (placeholders.length || /_{2,}|please fill|select|example|describe/i.test(`${label} ${prompt}`)) mode = 'compose';
        const key = `${normalizeActionKey(label)}|${normalizeActionKey(prompt)}|${mode}`;
        if (seen.has(key)) return;
        seen.add(key);
        output.push({
          label: label.length > 18 ? `${label.slice(0, 18).trim()}...` : label,
          prompt,
          mode,
          placeholders
        });
      });
      return output.slice(0, 4);
    }

    function toGuidanceActions(assistantText) {
      const text = String(assistantText || '');
      const quickAnswers = [];
      const pushAnswer = (label, prompt, mode = 'send', placeholders = []) => {
        if (!label || !prompt) return;
        if (quickAnswers.some((a) => a.label === label)) return;
        quickAnswers.push({ label, prompt, mode, placeholders });
      };

      const hasEntry = !!String(strategyState.entryTrigger || '').trim();
      const hasMarket = !!String(strategyState.market || '').trim();
      const hasTimeframe = !!String(strategyState.timeframe || '').trim();

      const normalized = text.replace(/\n/g, ' ');
      const optionMatches = [...normalized.matchAll(/([1-3])\.\s*([\s\S]*?)(?=(?:\s+[1-3]\.\s)|$)/g)];
      if (/reply with number|choose|1\/2\/3|请选择|回复数字/i.test(text) && optionMatches.length >= 2) {
        optionMatches.slice(0, 3).forEach((m) => {
          const idx = m[1];
          const title = String(m[2] || '').trim().replace(/[,.。;；].*$/, '');
          const shortTitle = title.length > 10 ? `${title.slice(0, 10)}...` : title;
          pushAnswer(`Choose ${idx}: ${shortTitle}`, `I choose ${idx}. Please lock this as the edge direction and continue.`);
        });
        pushAnswer('Compare options', 'I am not sure yet. Please compare options 1/2/3 in one sentence each.');
        return quickAnswers.slice(0, 4);
      }

      const discoverOptions = extractDiscoverOptions(text);
      if (discoverOptions.length >= 2) {
        discoverOptions.slice(0, 3).forEach((opt) => {
          pushAnswer(`Pick: ${opt.length > 12 ? `${opt.slice(0, 12)}...` : opt}`, `Start from this direction: ${opt}`, 'send');
        });
        pushAnswer('Help me choose', 'Please choose the easiest direction to validate first.');
        return quickAnswers.slice(0, 4);
      }

      if (!hasEntry) {
        pushAnswer('Add entry rule', 'My entry rule is: ', 'compose', ['Example: close > previous day high']);
        pushAnswer('Add exit rule', 'My exit rule is: ', 'compose', ['Example: close < previous day low']);
      }
      if (!hasMarket) {
        pushAnswer('Add market', 'My market is: ', 'compose', ['A-shares / US stocks / FX / Crypto']);
      }
      if (!hasTimeframe) {
        pushAnswer('Add timeframe', 'My timeframe is: ', 'compose', ['5m / 15m / 1h / 1d']);
      }
      if (quickAnswers.length) return quickAnswers.slice(0, 5);

      const unique = new Set();
      return splitAssistantGuidanceActions(assistantText)
        .filter((item) => {
          if (unique.has(item)) return false;
          unique.add(item);
          return true;
        })
        .slice(0, 4)
        .map((item) => ({
          label: 'Continue guidance',
          prompt: buildGuidancePrompt(item),
          mode: /describe|scenario|market|timeframe|样本|场景|现象/i.test(item) ? 'compose' : 'send',
          placeholders: /describe|scenario|场景|现象/i.test(item) ? ['Please add a concrete example'] : []
        }));
    }

    function toFormulaText(text) {
      if (!text) return '';
      return String(text)
        .replace(/greater than or equal to/gi, '>=')
        .replace(/less than or equal to/gi, '<=')
        .replace(/greater than|above/gi, '>')
        .replace(/less than|below/gi, '<')
        .replace(/cross(es)? above/gi, 'cross-up')
        .replace(/cross(es)? below/gi, 'cross-down')
        .replace(/\band\b/gi, ' and ')
        .replace(/\bor\b/gi, ' or ')
        .replace(/inside/gi, 'in')
        .replace(/outside/gi, 'out')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function toEdgeSummaryText(raw) {
      if (!raw) return '';
      let text = String(raw).trim();
      const jsonBlock = text.match(/\{[\s\S]*\}/);
      if (jsonBlock) {
        try {
          const parsed = JSON.parse(jsonBlock[0]);
          const fromUpdates = parsed?.updates?.edge || parsed?.edge || '';
          if (fromUpdates) text = String(fromUpdates).trim();
        } catch (_) {}
      }
      text = text
        .replace(/```json|```/gi, ' ')
        .replace(/["{}[\]]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      const fragments = text.split(/[。！？!?;\n]/).map((s) => s.trim()).filter(Boolean);
      let summary = fragments.find((s) => /edge|premise|假设|逻辑|breakout|trend|mean reversion/i.test(s)) || fragments[0] || '';
      if (summary.length > 78) summary = `${summary.slice(0, 78).trim()}...`;
      return summary;
    }

    function isValidEdgeText(raw) {
      const edge = toEdgeSummaryText(raw);
      if (!edge) return false;
      const lower = edge.toLowerCase();
      if (edge.length < 6) return false;
      if (/^(你好|您好|hi|hello)\b/i.test(lower)) return false;
      if (/请告诉我|请补充|你想构建|策略方向|品种|周期|继续补充|已更新模块/i.test(edge)) return false;
      const hasEdgeSignal = /because|edge|premise|优势|假设|错配|趋势|回归|突破|反转|动量|失效|期望|胜率|盈亏比|>|<|=|cross/i.test(edge);
      return hasEdgeSignal;
    }

    function getBaseUrl() {
      const saved = localStorage.getItem('baseUrl') || 'https://dashscope-intl.aliyuncs.com/compatible-mode/v1';

    function sanitizeDiscoverPromptText(rawText) {
      const text = String(rawText || '').replace(/^\uFEFF/, '').trim();
      if (!text) return '';
      const markers = [
        /ToMoon Discover AI Prompt/i,
        /你是\s*ToMoon\s*Discover\s*AI/i,
        /You are\s*ToMoon\s*Discover\s*AI/i
      ];
      const lines = text.split('\n');
      let startLine = 0;
      for (let i = 0; i < lines.length; i += 1) {
        if (markers.some((re) => re.test(lines[i]))) {
          startLine = i;
          break;
        }
      }
      const sliced = lines.slice(startLine).join('\n').trim();
      if (!sliced) return '';
      return sliced.length > 12000 ? `${sliced.slice(0, 12000)}\n\n[Prompt truncated for stability]` : sliced;
    }

    async function getDiscoverPrompt() {
      if (discoverPromptCache !== null) return discoverPromptCache;
      const candidates = ['../../backend/discover_prompt.md', '../backend/discover_prompt.md', './backend/discover_prompt.md'];
      for (const path of candidates) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          const text = sanitizeDiscoverPromptText(await res.text());
          if (text) {
            discoverPromptCache = `${text}\n\nReturn one JSON object only (no markdown): {"reply":"short reply","discoverActions":[{"label":"button text","prompt":"full prompt","mode":"send|compose","placeholders":["optional placeholder"]}],"updates":{}}`;
            return discoverPromptCache;
          }
        } catch (_) {}
      }
      discoverPromptCache = DEFAULT_SYSTEM_PROMPT;
      return discoverPromptCache;
    }

        edgeStatusPill.className = hasValidEdge
          ? 'inline-flex items-center rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700 dark:border-emerald-900 dark:bg-emerald-900/20 dark:text-emerald-300'
          : 'inline-flex items-center rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700 dark:border-amber-900 dark:bg-amber-900/20 dark:text-amber-300';
      }
      if (enterStructureBtn) enterStructureBtn.classList.toggle('hidden', !hasValidEdge);
      const enterStructureBtnMinimal = document.getElementById('discover-enter-structure-btn-minimal');
      if (enterStructureBtnMinimal) enterStructureBtnMinimal.classList.toggle('hidden', !hasValidEdge);

      const premiseTextContent = document.getElementById('discover-premise-text-content');
      if (premiseTextContent) {
        if (strategyState.edge && strategyState.edge.trim()) {
           premiseTextContent.textContent = toEdgeSummaryText(strategyState.edge);
        } else {
           premiseTextContent.innerHTML = 'No clear premise captured yet <span class="font-normal text-slate-500 dark:text-slate-400">— describe what you noticed</span>';
        }
      }

      if (premiseSummary) {
        const summaryTextEl = premiseSummary.querySelector('p');
        const fallbackSummary = assistantSummary || (lastAssistantMessage?.content || '').trim().slice(0, 120);
        
        if (fallbackSummary) {
          if (summaryTextEl) summaryTextEl.textContent = fallbackSummary;
          premiseSummary.classList.remove('hidden');
        } else {
          if (summaryTextEl) summaryTextEl.textContent = 'waiting for enough context...';
          premiseSummary.classList.add('hidden');
        }
      }
      
      const applyStateStyle = (el, ready) => {
        if (!el) return;
        const dot = el.querySelector('span');
        if (dot) {
          dot.className = ready
            ? 'w-2.5 h-2.5 rounded-full bg-emerald-500'
            : 'w-2.5 h-2.5 rounded-full bg-slate-300 dark:bg-slate-600';
        }
        el.className = ready
          ? 'inline-flex items-center gap-1.5 text-xs text-slate-800 dark:text-slate-100'
          : 'inline-flex items-center gap-1.5 text-xs text-slate-600 dark:text-slate-300';
      };
      applyStateStyle(stateObservation, hasObservation);
      applyStateStyle(stateContext, hasContext);
      applyStateStyle(stateOutcome, hasOutcome);
      applyStateStyle(stateLogic, hasValidEdge);
      applyStateStyle(stateFailure, hasFailure);
      renderDiscoverStateDetails();

      const welcomeHeader = document.getElementById('discover-welcome-header');
      const inputContainer = document.getElementById('discover-input-container');
      const inputBg = document.getElementById('discover-input-bg');
      const chatToolbar = document.getElementById('discover-chat-toolbar');
      const minimalSend = document.getElementById('discover-minimal-send');
      
      const hasConversation = strategyConversation.length > 0;
      const showBoardClasses = ['opacity-100', 'pointer-events-auto'];
      const hideBoardClasses = ['opacity-0', 'pointer-events-none'];
      const showHintClasses = ['opacity-100', 'translate-y-0', 'max-h-10', 'pointer-events-auto'];
      const hideHintClasses = ['opacity-0', 'translate-y-2', 'max-h-0', 'pointer-events-none'];
      const composerFixedClasses = ['bottom-6'];
      const composerFlowClasses = [];
      const layoutState = hasConversation ? 'active' : 'empty';

      if (welcomeHeader && inputContainer && inputBg) {
        if (discoverLayoutState !== layoutState) {
          if (!hasConversation) {
            // Empty state layout (ChatGPT style)
            welcomeHeader.classList.remove('hidden');
            welcomeHeader.classList.remove('discover-header-collapsed', 'h-0', 'pointer-events-none', 'overflow-hidden');
            welcomeHeader.classList.add('discover-header-expanded');
            inputContainer.classList.remove(...composerFixedClasses);
            inputContainer.classList.add(...composerFlowClasses);
            scheduleDiscoverComposerPositionUpdate(true);
            inputBg.classList.remove('bg-gradient-to-t', 'from-[#F8F7FB]', 'dark:from-dark-bg', 'via-[#F8F7FB]/90', 'dark:via-dark-bg/90', 'to-transparent');
            inputBg.style.background = 'transparent';
            if (chatToolbar) chatToolbar.classList.add('hidden');
            if (minimalSend) minimalSend.classList.remove('hidden');
            if (boardsContainer) {
              boardsContainer.classList.remove(...showBoardClasses);
              boardsContainer.classList.add(...hideBoardClasses);
            }
            if (emptyHint) {
              emptyHint.classList.remove(...showHintClasses);
              emptyHint.classList.add(...hideHintClasses);
            }
          } else {
            // Active chat layout
            welcomeHeader.classList.remove('discover-header-expanded');
            welcomeHeader.classList.add('discover-header-collapsed', 'h-0', 'pointer-events-none', 'overflow-hidden');
            welcomeHeader.classList.add('hidden');
            inputContainer.classList.remove(...composerFlowClasses);
            inputContainer.classList.add(...composerFixedClasses);
            discoverComposerBottom = null;
            inputContainer.style.bottom = '';
            inputBg.classList.remove('bg-gradient-to-t', 'from-[#F8F7FB]', 'dark:from-dark-bg', 'via-[#F8F7FB]/90', 'dark:via-dark-bg/90', 'to-transparent');
            inputBg.style.background = 'transparent';
            if (chatToolbar) chatToolbar.classList.remove('hidden');
            if (minimalSend) minimalSend.classList.add('hidden');
            if (boardsContainer) {
              boardsContainer.classList.add(...showBoardClasses);
              boardsContainer.classList.remove(...hideBoardClasses);
            }
            if (emptyHint) {
              emptyHint.classList.remove(...showHintClasses);
              emptyHint.classList.add(...hideHintClasses);
            }
          }
          discoverLayoutState = layoutState;
        } else if (!hasConversation) {
          scheduleDiscoverComposerPositionUpdate();
        }
      }

      if (threadWrap) {
        threadWrap.classList.add('transition-all', 'duration-500');
        threadWrap.classList.remove('hidden');
        threadWrap.classList.toggle('mt-4', hasConversation);
        threadWrap.classList.toggle('md:mt-6', hasConversation);
        threadWrap.classList.toggle('mt-8', !hasConversation);
        threadWrap.classList.toggle('md:mt-10', !hasConversation);
        threadWrap.classList.toggle('discover-thread-visible', hasConversation);
        threadWrap.classList.toggle('discover-thread-hidden', !hasConversation);
        // Keep chat content stable when the top status panel expands/collapses.
        threadWrap.style.paddingTop = hasConversation ? '116px' : '';
      }

      const structuredActions = normalizeDiscoverActions(lastAssistantMessage?.discoverActions);
      const dynamicGuidance = hasConversation && !hasValidEdge
        ? (structuredActions.length ? structuredActions : toGuidanceActions(lastAssistantMessage?.content || ''))
        : [];
      if (hasConversation && !hasValidEdge) {
        const skipAction = {
          label: 'Skip to Blueprint',
          prompt: 'Please skip Discover and enter Blueprint with a demo strategy.',
          mode: 'send',
          placeholders: []
        };
        const hasSkipAction = dynamicGuidance.some((item) => normalizeActionKey(item.label || item.prompt) === normalizeActionKey(skipAction.label));
        if (!hasSkipAction) dynamicGuidance.unshift(skipAction);
      }
      if (guidanceWrap && guidanceActions) {
        if (dynamicGuidance.length) {
          guidanceWrap.classList.remove('hidden');
          guidanceActions.innerHTML = dynamicGuidance.map((item) => `
            <button onclick="onGuidanceActionClick('${escapeJsSingleQuoted(item.prompt)}','${escapeJsSingleQuoted(item.label)}','${escapeJsSingleQuoted(item.mode || 'send')}','${escapeJsSingleQuoted((item.placeholders || []).join(';'))}')" class="px-3 py-1.5 rounded-full border ${item.mode === 'compose' ? 'border-indigo-200 dark:border-indigo-800 bg-indigo-50 dark:bg-slate-800 text-indigo-700 dark:text-indigo-300' : 'border-purple-200 dark:border-purple-800 bg-purple-50 dark:bg-slate-800 text-purple-700 dark:text-purple-300'} text-[12px] transition-colors">${escapeHtml(item.label)}</button>
          `).join('');
        } else {
          guidanceWrap.classList.add('hidden');
          guidanceActions.innerHTML = '';
        }
      }
    }

    function getDiscoverStateDrafts() {
      const synthesis = buildDiscoverSynthesis();
      return {
        observation: synthesis.phenomenon || 'Waiting for a clear core idea.',
        context: synthesis.conditions || 'Waiting for market, timeframe, and regime clues.',
        outcome: synthesis.result || 'Waiting for entry and expected move definition.',
        logic: synthesis.edge || 'Waiting for a falsifiable edge explanation.',
        failure: synthesis.failure || 'Waiting for invalidation or failure condition.'
      };
    }

    function setDiscoverDetailBadge(id, ready) {
      const badge = document.getElementById(id);
      if (!badge) return;
      badge.textContent = ready ? 'Ready' : 'Missing';
      badge.className = ready
        ? 'rounded-full border border-emerald-200 dark:border-emerald-800 bg-emerald-50 dark:bg-emerald-900/30 px-2 py-0.5 text-[10px] font-semibold text-emerald-600 dark:text-emerald-300'
        : 'rounded-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/70 px-2 py-0.5 text-[10px] font-semibold text-slate-500 dark:text-slate-300';
    }

    function renderDiscoverStateDetails() {
      const drafts = getDiscoverStateDrafts();
      const readiness = {
        observation: !!String(getLastUserText() || '').trim(),
        context: !!(String(strategyState.market || '').trim() || String(strategyState.timeframe || '').trim() || String(strategyState.strategyType || '').trim() || String(strategyState.volatilityFilter || '').trim()),
        outcome: !!(String(strategyState.entryTrigger || '').trim() || String(strategyState.takeProfit || '').trim()),
        logic: isValidEdgeText(strategyState.edge),
        failure: !!(String(strategyState.stopLoss || '').trim() || /失效|fail|invalid|regime/i.test(String(strategyState.edge || '')))
      };

      Object.keys(drafts).forEach((key) => {
        const detail = document.getElementById(`discover-state-${key}-detail`);
        if (detail) detail.textContent = drafts[key];
        setDiscoverDetailBadge(`discover-state-${key}-badge`, !!readiness[key]);
      });
    }

    function toggleDiscoverStateDetails() {
      const details = document.getElementById('discover-state-details');
      const btn = document.getElementById('discover-state-toggle-btn');
      const icon = document.getElementById('discover-state-toggle-icon');
      const text = document.getElementById('discover-state-toggle-text');
      if (!details) return;

      const willOpen = details.classList.contains('hidden');
      details.classList.toggle('hidden', !willOpen);
      if (btn) btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      if (text) text.textContent = willOpen ? 'Hide full status' : 'View full status';
      if (icon) icon.setAttribute('data-lucide', willOpen ? 'chevron-up' : 'chevron-down');
      if (willOpen) renderDiscoverStateDetails();
      setTimeout(() => lucide.createIcons(), 0);
    }

    function quoteDiscoverStateForEdit(kind) {
      const drafts = getDiscoverStateDrafts();
      const textByKind = {
        observation: `Core idea draft: ${drafts.observation}\nRefine into one falsifiable statement: 【edge premise】`,
        context: `Current conditions: ${drafts.context}\nAdd exact boundaries (market/timeframe/regime): 【boundaries】`,
        outcome: `Target move draft: ${drafts.outcome}\nMake it measurable: 【target move + metric】`,
        logic: `Edge reason draft: ${drafts.logic}\nExplain why this should work: 【causal logic】`,
        failure: `Failure mode draft: ${drafts.failure}\nDefine strict invalidation: 【failure condition】`
      };
      const nextText = textByKind[kind] || `Refine this state item: ${drafts.observation}`;
      const textarea = getActiveComposerTextarea();
      if (!textarea) return;
      textarea.value = nextText;
      textarea.focus();
      focusComposeTemplate(textarea, nextText);
    }

    function toggleDiscoverSummaryEdit() {
      const summaryText = document.getElementById('discover-summary-text');
      const editBtn = document.getElementById('discover-summary-edit-btn');
      const autoBadge = document.getElementById('discover-summary-auto-badge');
      if (!summaryText || !editBtn) return;

      const isEditing = summaryText.getAttribute('contenteditable') === 'true';
      if (!isEditing) {
        summaryText.setAttribute('contenteditable', 'true');
        summaryText.classList.add('ring-1', 'ring-purple-300', 'rounded', 'px-1');
        if (autoBadge) autoBadge.textContent = 'Editing';
        editBtn.title = 'Save summary';
        const icon = editBtn.querySelector('i');
        if (icon) icon.setAttribute('data-lucide', 'check');
        const range = document.createRange();
        const selection = window.getSelection();
        range.selectNodeContents(summaryText);
        range.collapse(false);
        if (selection) {
          selection.removeAllRanges();
          selection.addRange(range);
        }
        summaryText.focus();
      } else {
        summaryText.setAttribute('contenteditable', 'false');
        summaryText.classList.remove('ring-1', 'ring-purple-300', 'rounded', 'px-1');
        const edited = String(summaryText.textContent || '').trim();
        if (autoBadge) autoBadge.textContent = edited ? 'Edited' : 'Auto-generated';
        editBtn.title = 'Edit summary';
        const icon = editBtn.querySelector('i');
        if (icon) icon.setAttribute('data-lucide', 'pencil');
      }
      setTimeout(() => lucide.createIcons(), 0);
    }

    function buildDiscoverCategoryChip(label, index) {
      const styles = [
        { icon: 'lightbulb', cls: 'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 border-blue-100 dark:border-blue-800/30' },
        { icon: 'target', cls: 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300 border-emerald-100 dark:border-emerald-800/30' },
        { icon: 'shield', cls: 'bg-orange-50 dark:bg-orange-900/20 text-orange-700 dark:text-orange-300 border-orange-100 dark:border-orange-800/30' },
        { icon: 'bar-chart-3', cls: 'bg-purple-50 dark:bg-purple-900/20 text-purple-700 dark:text-purple-300 border-purple-100 dark:border-purple-800/30' }
      ];
      const style = styles[index % styles.length];
      return `
        <span class="inline-flex items-center px-2 py-1 rounded-md text-[11px] font-medium border ${style.cls}">
          <i data-lucide="${style.icon}" class="w-2.5 h-2.5 mr-1"></i>
          <span data-discover-category-label="1">${escapeHtml(label)}</span>
        </span>
      `;
    }

    function toggleDiscoverCategoriesEdit() {
      const list = document.getElementById('discover-categories-list');
      const editBtn = document.getElementById('discover-categories-edit-btn');
      if (!list || !editBtn) return;

      const editor = list.querySelector('textarea[data-discover-categories-editor="1"]');
      if (editor) {
        const labels = String(editor.value || '')
          .split(/[\n,，]/)
          .map((item) => item.trim())
          .filter(Boolean)
          .slice(0, 8);
        const normalized = labels.length ? labels : ['Hypothesis'];
        list.innerHTML = normalized.map((label, idx) => buildDiscoverCategoryChip(label, idx)).join('');
        editBtn.textContent = 'Edit';
        setTimeout(() => lucide.createIcons(), 0);
        return;
      }

      const current = Array.from(list.querySelectorAll('[data-discover-category-label="1"]'))
        .map((el) => String(el.textContent || '').trim())
        .filter(Boolean);
      const seed = current.length ? current.join(', ') : 'Hypothesis, Entry Logic, Risk Rule';
      list.innerHTML = `<textarea data-discover-categories-editor="1" class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/40 px-2.5 py-2 text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500/25" rows="2" placeholder="Comma-separated categories">${escapeHtml(seed)}</textarea>`;
      editBtn.textContent = 'Save';
      const nextEditor = list.querySelector('textarea[data-discover-categories-editor="1"]');
      if (nextEditor) {
        nextEditor.focus();
        nextEditor.setSelectionRange(nextEditor.value.length, nextEditor.value.length);
      }
    }

    function initDiscoverEvents() {
      const uploadInput = document.getElementById('discover-upload-input');
      const dropzone = document.getElementById('discover-upload-dropzone');
      if (uploadInput && uploadInput.dataset.bound !== '1') {
        uploadInput.dataset.bound = '1';
        uploadInput.addEventListener('change', () => {
          handleDiscoverAttachmentFiles(uploadInput.files);
          uploadInput.value = '';
        });
      }
      if (dropzone && dropzone.dataset.bound !== '1') {
        dropzone.dataset.bound = '1';
        ['dragenter', 'dragover'].forEach((eventName) => {
          dropzone.addEventListener(eventName, (event) => {
            event.preventDefault();
            event.stopPropagation();
            dropzone.classList.add('border-purple-400', 'bg-purple-50/70', 'dark:bg-purple-900/15');
          });
        });
        ['dragleave', 'dragend', 'drop'].forEach((eventName) => {
          dropzone.addEventListener(eventName, (event) => {
            event.preventDefault();
            event.stopPropagation();
            dropzone.classList.remove('border-purple-400', 'bg-purple-50/70', 'dark:bg-purple-900/15');
          });
        });
        dropzone.addEventListener('drop', (event) => {
          handleDiscoverAttachmentFiles(event.dataTransfer?.files);
        });
      }
    }

    function applyWorkflowModeUI() {
      const mode = getWorkflowMode();
      setCanvasMode(mode);
      renderDiscoverCanvasState();
    }

    function setTopbarStage() {
      const isEdgeDone = isValidEdgeText(strategyState.edge);
      const missing = getMissingItems();
      const missingAfterEdge = missing.filter((item) => item.key !== 'edge');
      const currentStage = isEmptyState ? 'discover' : (!isEdgeDone ? 'discover' : (missingAfterEdge.length ? 'structure' : 'backtest'));
      const stageOrder = ['discover', 'structure', 'backtest'];
      const activeIndex = stageOrder.indexOf(currentStage);
      const progressByStage = { discover: '8%', structure: '50%', backtest: '100%' };

      const applyStageStyle = (stage) => {
        const node = document.getElementById(`step-${stage}`);
        const label = document.getElementById(`step-${stage}-label`);
        const icon = document.getElementById(`step-${stage}-icon`);
        if (!node || !label) return;
        const index = stageOrder.indexOf(stage);
        if (index < activeIndex) {
          node.className = 'relative z-10 flex items-center gap-1.5 px-3 py-1 bg-slate-50 dark:bg-[#101a2b] border border-slate-200 dark:border-slate-700 rounded-full transition-colors';
          label.className = 'text-xs font-semibold text-slate-700 dark:text-slate-200';
          if (icon) {
            icon.setAttribute('data-lucide', 'check-circle-2');
            icon.className = 'w-4 h-4 text-emerald-500';
          }
          return;
        }
        if (index === activeIndex) {
          node.className = 'relative z-10 flex items-center gap-1.5 px-3 py-1.5 bg-purple-50 dark:bg-[#2b1a3f] rounded-full border border-purple-100 dark:border-purple-700 shadow-sm pointer-events-auto';
          label.className = 'text-xs font-semibold text-purple-700 dark:text-purple-400';
          if (icon) icon.className = 'w-4 h-4 text-purple-500';
          return;
        }
        node.className = 'relative z-10 flex items-center gap-1.5 px-3 py-1 bg-slate-50 dark:bg-[#101a2b] border border-slate-200 dark:border-slate-700 rounded-full transition-colors';
        label.className = 'text-xs font-medium text-slate-500 dark:text-slate-400';
        if (icon) icon.className = 'w-4 h-4 text-slate-400';
      };

      stageOrder.forEach(applyStageStyle);
      const fill = document.getElementById('topbar-progress-fill');
      if (fill) fill.style.width = progressByStage[currentStage] || '8%';

      const discoverHint = document.getElementById('step-discover-hint');
      const discoverIcon = document.getElementById('step-discover-icon');
      if (discoverHint) discoverHint.textContent = isEdgeDone ? 'Edge done' : 'Edge first';
      if (discoverIcon) discoverIcon.setAttribute('data-lucide', isEdgeDone ? 'check-circle-2' : 'sparkles');
      applyWorkflowModeUI();
    }

    function getCardSubtitleText(cardKey) {
      const executionCount = Array.isArray(strategyState.executionItems) ? strategyState.executionItems.length : 0;
      const signalCount = Array.isArray(strategyState.signalLogicItems) ? strategyState.signalLogicItems.length : 0;
      const riskCount = Array.isArray(strategyState.riskMoneyItems) ? strategyState.riskMoneyItems.length : 0;
      const notesCount = Array.isArray(strategyState.dataConnectionNotes) ? strategyState.dataConnectionNotes.length : 0;
      const map = {
        'premise-edge': toEdgeSummaryText(strategyState.edge) || 'Waiting for a testable edge statement.',
        'strategy-identity': [strategyState.market, strategyState.timeframe, strategyState.strategyType].filter(Boolean).join(' | ') || 'Waiting for market, timeframe, and strategy type.',
        'market-regime': strategyState.volatilityFilter ? 'Regime filter has been defined by AI.' : 'Waiting for market regime and volatility boundaries.',
        'signal-logic': strategyState.entryTrigger
          ? `Signal trigger defined. ${signalCount ? `${signalCount} supporting logic item(s).` : 'Ready for refinement.'}`
          : 'Waiting for setup, trigger, and invalidation narrative.',
        execution: executionCount ? `${executionCount} execution rule(s) drafted by AI.` : 'Waiting for execution constraints and order style.',
        'risk-money': [
          strategyState.stopLoss ? 'Stop-loss defined' : 'Stop-loss missing',
          strategyState.takeProfit ? 'Take-profit defined' : 'Take-profit missing',
          riskCount ? `${riskCount} extra risk item(s)` : ''
        ].filter(Boolean).join(' | ') || 'Waiting for risk budget and exit logic.',
        'data-connection': strategyState.useOwnData
          ? `Data source connected${notesCount ? ` with ${notesCount} note(s).` : '.'}`
          : 'Waiting for data source and dependency notes.'
      };
      return map[cardKey] || 'Waiting for AI summary.';
    }

    function setModuleCardCollapsedState(card, collapsed) {
      if (!card) return;
      const bodyNodes = card.querySelectorAll('[data-module-body]');
      const extraNodes = card.querySelectorAll('[data-module-extra]');
      const subtitle = card.querySelector('[data-module-subtitle]');
      bodyNodes.forEach((node) => node.classList.toggle('hidden', collapsed));
      extraNodes.forEach((node) => node.classList.toggle('hidden', collapsed));
      if (subtitle) subtitle.classList.toggle('hidden', !collapsed);
      card.dataset.collapsed = collapsed ? '1' : '0';
    }

    function renderModuleCardSubtitles() {
      const cardKeys = ['premise-edge', 'strategy-identity', 'market-regime', 'signal-logic', 'risk-money', 'execution', 'data-connection'];
      cardKeys.forEach((cardKey) => {
        const card = document.querySelector(`[data-module-card="${cardKey}"]`);
        if (!card) return;
        if (!card.dataset.collapsed) card.dataset.collapsed = '0';
        const subtitle = card.querySelector('[data-module-subtitle]');
        if (subtitle) subtitle.textContent = getCardSubtitleText(cardKey);
        setModuleCardCollapsedState(card, card.dataset.collapsed === '1');
      });
    }

    function applyStrategyStateToCenter() {
      const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el && value !== undefined) el.textContent = value;
      };
      setText('module-market', strategyState.market || 'Pending');
      setText('module-timeframe', strategyState.timeframe || 'Pending');
      setText('module-strategy-type', strategyState.strategyType || 'Pending');
      const edgeSummary = toEdgeSummaryText(strategyState.edge);
      const hasValidEdge = isValidEdgeText(strategyState.edge);
      setText('module-edge', hasValidEdge ? edgeSummary : 'Waiting for a core edge hypothesis');
      setText('module-volatility-filter', strategyState.volatilityFilter || 'Pending');
      setText('module-entry-trigger', strategyState.entryTrigger || 'Pending');
      setText('module-stop-loss', strategyState.stopLoss || 'Pending');
      setText('module-take-profit', strategyState.takeProfit || 'Optional');
      setText('module-take-profit-status', strategyState.takeProfit ? 'Configured' : 'Incomplete');
      setText('module-status-identity', strategyState.market && strategyState.timeframe && strategyState.strategyType ? 'CONFIRMED' : 'IN PROGRESS');

      const cardStates = [
        ['card-premise-edge', hasValidEdge],
        ['card-strategy-identity', !!(hasValidEdge && strategyState.market && strategyState.timeframe && strategyState.strategyType)],
        ['card-market-regime', !!strategyState.volatilityFilter],
        ['card-signal-logic', !!strategyState.entryTrigger],
        ['card-risk-money', !!(strategyState.stopLoss && strategyState.takeProfit)],
        ['card-data-connection', !!strategyState.useOwnData]
      ];
      cardStates.forEach(([id, ready]) => {
        const card = document.getElementById(id);
        if (!card) return;
        card.style.opacity = ready ? '1' : '0.65';
      });
      syncBlueprintCanvasVisibility();
      renderDynamicModuleLists();
      renderModuleCardSubtitles();
      applyWorkflowModeUI();
    }

    function getBlueprintVisibleState() {
      const visible = (key) => !hiddenBlueprintCards.has(key);
      return {
        premise: visible('premise-edge'),
        identity: visible('strategy-identity'),
        marketRegime: visible('market-regime'),
        signalLogic: visible('signal-logic'),
        riskMoney: visible('risk-money'),
        execution: visible('execution'),
        dataConnection: visible('data-connection')
      };
    }

    function normalizeUpdatePayload(payload) {

      };
    }

    function tryParseJsonFromText(text) {
      if (!text) return null;
      const match = text.match(/```json\s*([\s\S]*?)\s*```/i);
      const raw = match ? match[1] : text.trim();
      try { return JSON.parse(raw); } catch (_) {}
      const firstBrace = raw.indexOf('{');
      if (firstBrace < 0) return null;
      let depth = 0;
      let inString = false;
      let escaped = false;
      for (let i = firstBrace; i < raw.length; i += 1) {
        const ch = raw[i];
        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (ch === '\\') {
            escaped = true;
          } else if (ch === '"') {
            inString = false;
          }
          continue;
        }
        if (ch === '"') {
          inString = true;
          continue;
        }
        if (ch === '{') depth += 1;
        if (ch === '}') {
          depth -= 1;
          if (depth === 0) {
            const candidate = raw.slice(firstBrace, i + 1);
            try { return JSON.parse(candidate); } catch (_) { return null; }
          }
        }
      }
      return null;
    }

    function extractHeuristicUpdates(text) {
      const t = (text || '').toLowerCase();
      const updates = {};
      if (/\bgold\b|xau\/?usd|黄金/.test(t)) { updates.market = 'Gold (XAU/USD)'; updates.marketShort = 'XAU/USD'; }
      if (/\beur\/?usd\b|欧元/.test(t)) { updates.market = 'EUR/USD'; updates.marketShort = 'EUR/USD'; }
      if (/\b1h\b|1 hour|h1|1小时/.test(t)) { updates.timeframe = '1H Timeframe'; updates.timeframeShort = '1 Hour'; }
      if (/\b4h\b|4 hour|h4|4小时/.test(t)) { updates.timeframe = '4H Timeframe'; updates.timeframeShort = '4 Hour'; }
      if (/\b15m\b|15 min|m15|15分钟/.test(t)) { updates.timeframe = '15M Timeframe'; updates.timeframeShort = '15 Min'; }
      if (/breakout|突破/.test(t)) { updates.strategyType = 'Breakout Strategy'; updates.strategyTypeShort = 'Breakout'; }
      if (/mean reversion|均值回归/.test(t)) { updates.strategyType = 'Mean Reversion Strategy'; updates.strategyTypeShort = 'Mean Reversion'; }
      if (/volatility|atr/.test(t)) updates.volatilityFilter = 'ATR-based Volatility Filter';
      if (/entry|trigger|入场|突破上轨/.test(t)) updates.entryTrigger = 'close > breakout_high';
      if (/stop loss|止损/.test(t)) {
        const m = text.match(/(\d+(\.\d+)?)\s*\*?\s*atr/i);
        updates.stopLoss = m ? `SL = ${m[1]} * ATR` : 'SL = ATR-based';
      }
      if (/take profit|profit target|止盈/.test(t)) {
        const m = text.match(/(\d+(\.\d+)?)\s*r/i);
        updates.takeProfit = m ? `TP = ${m[1]}R` : 'TP = rule-based';
      }
      if (/trail(ing)? stop|移动止损|追踪止损/.test(t)) {
        updates.executionItems = [{ title: 'Trailing Stop', value: 'trail stop after 1R' }];
      }
      if (/breakeven|break even|保本/.test(t)) {
        updates.executionItems = [{ title: 'Breakeven Rule', value: 'move stop to breakeven after 1R' }];
      }
      if (/limit order|限价单/.test(t)) {
        updates.executionItems = [{ title: 'Execution', value: 'enter with limit order' }];
      }
      if (/market order|市价单/.test(t)) {
        updates.executionItems = [{ title: 'Execution', value: 'enter with market order' }];
      }
      const smaTrend = t.match(/sma\s*(\d{1,3})\s*(?:>=|>|大于|高于)\s*sma\s*(\d{1,3})/i);
      if (smaTrend) {
        const left = smaTrend[1];
        const right = smaTrend[2];
        const condition = `sma${left} > sma${right}`;
        const wantsEntry = /buy|long|entry|trigger|买入|做多|入场/.test(t);
        const baseEntry = String(strategyState.entryTrigger || '').trim();
        if (wantsEntry) {
          const hasSame = new RegExp(`sma\\s*${left}\\s*>\\s*sma\\s*${right}`, 'i').test(baseEntry);
          updates.entryTrigger = hasSame ? baseEntry : (baseEntry ? `(${baseEntry}) && ${condition}` : condition);
        }
        if (/执行|execution|condition|条件|filter|过滤/.test(t)) {
          updates.executionItems = [{ title: 'Execution Condition', value: condition }];
        }
      }
      if (/own data|csv|自有数据|自己的数据/.test(t)) updates.useOwnData = true;
      if (/economic calendar|news filter|经济日历|新闻过滤/.test(t)) updates.economicCalendarReady = true;
      if (!updates.edge && /(because|edge|premise|优势|因为|因此|假设|错配|趋势|回归|突破|反转|动量|失效)/.test(t)) {
        const edgeCandidate = toEdgeSummaryText(text);
        if (isValidEdgeText(edgeCandidate)) updates.edge = edgeCandidate;
      }
      const pick = (label, value) => ({ title: label, value: toFormulaText(value) });
      if (updates.entryTrigger) updates.signalLogicItems = [pick('Entry Trigger', updates.entryTrigger)];
      if (updates.stopLoss || updates.takeProfit) {
        updates.riskMoneyItems = [];
        if (updates.stopLoss) updates.riskMoneyItems.push(pick('Stop Loss', updates.stopLoss));
        if (updates.takeProfit) updates.riskMoneyItems.push(pick('Take Profit', updates.takeProfit));
      }
      if (updates.useOwnData) updates.dataConnectionNotes = ['Use user-provided CSV/own data source'];
      return updates;
    }

    function applyUpdatesAndCollectModules(updates) {
      const updatedModules = [];
      Object.keys(updates || {}).forEach((key) => {
        if (!(key in strategyState) || updates[key] === undefined || updates[key] === null) return;
        let nextValue = updates[key];
        if (key === 'useOwnData' || key === 'economicCalendarReady') {
          if (typeof nextValue === 'string') nextValue = nextValue.toLowerCase() === 'true';
          nextValue = !!nextValue;
        }
        if (key === 'edge') {
          nextValue = toEdgeSummaryText(nextValue);
          if (!isValidEdgeText(nextValue)) return;
        }
        if (strategyState[key] !== nextValue) {
          if (Array.isArray(nextValue)) {
            nextValue = nextValue.slice(0, 8);
          }
          strategyState[key] = nextValue;
          if (FIELD_TO_MODULE[key]) updatedModules.push(FIELD_TO_MODULE[key]);
        }
        if (key === 'edge' && isValidEdgeText(nextValue)) hiddenBlueprintCards.delete('premise-edge');
        if (['market', 'timeframe', 'strategyType'].includes(key) && String(nextValue || '').trim()) hiddenBlueprintCards.delete('strategy-identity');
        if (key === 'volatilityFilter' && String(nextValue || '').trim()) hiddenBlueprintCards.delete('market-regime');
        if (key === 'entryTrigger' && String(nextValue || '').trim()) hiddenBlueprintCards.delete('signal-logic');
        if (key === 'executionItems' && Array.isArray(nextValue) && nextValue.length) hiddenBlueprintCards.delete('execution');
        if ((key === 'stopLoss' || key === 'takeProfit') && String(nextValue || '').trim()) hiddenBlueprintCards.delete('risk-money');
        if ((key === 'useOwnData' && !!nextValue) || (key === 'dataConnectionNotes' && Array.isArray(nextValue) && nextValue.length)) hiddenBlueprintCards.delete('data-connection');
      });
      applyStrategyStateToCenter();
      applyStrategyStateToRight();
      setTopbarStage();
      return updatedModules;
    }

    function buildDiscoverFallbackReply(userText, updates = {}) {
      const text = String(userText || '').trim();
      const updatedKeys = Object.keys(updates || {});
      const hasContextUpdate = updatedKeys.some((k) => ['market', 'timeframe', 'entryTrigger', 'stopLoss', 'takeProfit', 'strategyType'].includes(k));
      if (!text) {
        return 'Share one concrete market observation first, and I will convert it into a testable edge hypothesis.';
      }
      if (/^(hi|hello|你好|ni hao)\b/i.test(text) || text.length <= 6) {
        return 'Got it. Please add one concrete clue (market + timeframe + trigger) so I can infer a valid edge premise.';
      }
      if (!isValidEdgeText(strategyState.edge) && hasContextUpdate) {
        return 'I captured your inputs. Next, explain *why* this setup should work and when it fails, then I can lock the edge.';
      }
      const missing = getMissingItems();
      const topMissing = missing.slice(0, 2).map((m) => m.label).join(' + ');
      return topMissing
        ? `I captured your input. Please add ${topMissing} to move discover forward.`
        : 'I captured your input. Please add one falsifiable premise for this setup so we can finalize the edge.';
    }

    function isGreetingLikeText(text) {
      const t = String(text || '').trim();
      if (!t) return false;
      if (/^(hi|hello|hey|你好|您好|哈喽|嗨)\b/i.test(t)) return true;
      return t.length <= 4 && !/[0-9=><+\-*/]/.test(t);
    }

    function buildStructureFallbackReply(userText, updates = {}) {
      const text = String(userText || '').trim();
      const updatedKeys = Object.keys(updates || {});
      const hasUpdates = updatedKeys.length > 0;
      const missing = getMissingItems();

      if (!text) return 'Please add one concrete rule so I can continue filling your strategy structure.';
      if (isGreetingLikeText(text)) {
        if (isDemoPrefillMode) {
          const top = missing[0]?.label || 'Execution Detail';
          return `Hi, demo prefill is active, but chat is fully flexible. You can ask any strategy question, or add one rule for ${top} to continue.`;
        }
        const top = missing[0]?.label || 'Entry Trigger';
        return `Hi! I can answer freely here. If you want to keep building, add one concrete ${top} rule (condition/formula).`;
      }

      if (hasUpdates) {
        const topMissing = missing.slice(0, 2).map((m) => m.label).join(' + ');
        return topMissing
          ? `Updated. Next I suggest completing: ${topMissing}.`
          : 'Great, structure is complete enough for the next stage. You can proceed to Backtest or add execution details.';
      }

      if (/sma|ema|\bma\d+\b|上穿|下穿|均线|交叉|cross/i.test(text)) {
        return `I got your MA condition. I can map it into Entry Trigger or Execution filter directly; tell me which one you prefer, or I can apply both.`;

      const topMissing = missing.slice(0, 2).map((m) => m.label).join(' + ');
      return topMissing
        ? `I understood your request. To keep building, we can add ${topMissing} next, or I can first explain what I already captured from your message.`
        : 'I understood your request. If you want, I can refine this into a stricter formula (trigger / stop loss / take profit / failure mode).';
