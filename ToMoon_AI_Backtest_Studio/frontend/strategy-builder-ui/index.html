        'i captured your input and updated the strategy state. please provide the next key rule.',

        push('Add Failure Test', 'Failure mode test: 【regime/condition where edge should be disabled】', 'compose', ['failure mode']);
      }

    async function callStrategyAI(userText) {
      const apiKey = (localStorage.getItem('apiKey') || '').trim();
      const model = localStorage.getItem('model') || 'qwen-plus';
      const baseUrl = getBaseUrl();
      if (!apiKey) {
        return { reply: `Please configure a valid API key first. Model: ${model}; Base URL: ${baseUrl}`, updates: {} };
      }
      if (!apiKey.startsWith('sk-')) {
        return { reply: 'Invalid API key format. Please ensure it starts with sk-.', updates: {} };
      }
      const systemPrompt = getWorkflowMode() === 'discover' ? await getDiscoverPrompt() : DEFAULT_SYSTEM_PROMPT;
      const messages = [
        { role: 'system', content: systemPrompt },
        ...strategyConversation.slice(-8).map((m) => ({ role: m.role, content: m.content })),
        { role: 'user', content: userText }
      ];
      const doFetch = async (stream) => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        try {
          const requestBody = stream ? { model, messages, stream: true, stream_options: { include_usage: true } } : { model, messages, stream: false };
          const response = await fetch(`${baseUrl}/chat/completions`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody),
            signal: controller.signal
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          if (!stream) {
            const json = await response.json();
            return json?.choices?.[0]?.message?.content || '';
          }
          if (!response.body) return '';
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let out = '';
          const started = Date.now();
          while (true) {
            if (Date.now() - started > 30000) throw new Error('Stream timeout');
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const rawLine of lines) {
              const line = rawLine.trim();
              if (!line.startsWith('data:')) continue;
              const dataStr = line.slice(5).trim();
              if (dataStr === '[DONE]') return out;
              try {
                const data = JSON.parse(dataStr);
                const delta = data.choices?.[0]?.delta || {};
                if (delta.content) out += delta.content;
              } catch (_) {}
            }
          }
          return out;
        } finally {
          clearTimeout(timeoutId);
        }
      };

      let out = '';
      let transportError = '';
      try {
        out = await doFetch(true);
      } catch (err) {
        transportError = err?.message || String(err || '');
        try {
          out = await doFetch(false);
        } catch (fallbackErr) {
          transportError = fallbackErr?.message || transportError;
          out = '';
        }
      }

      if (!String(out || '').trim()) {
        throw new Error(transportError || 'AI endpoint returned an empty response.');
      }

      const parsedJson = tryParseJsonFromText(out);
      const parsed = normalizeUpdatePayload(parsedJson);
      if (parsed.updates && !parsed.updates.executionItems) {
        const blocks = parsedJson;
        if (blocks && blocks.updates) {
          if (Array.isArray(blocks.updates.executionItems)) parsed.updates.executionItems = blocks.updates.executionItems;
          if (Array.isArray(blocks.updates.signalLogicItems)) parsed.updates.signalLogicItems = blocks.updates.signalLogicItems;
          if (Array.isArray(blocks.updates.riskMoneyItems)) parsed.updates.riskMoneyItems = blocks.updates.riskMoneyItems;
          if (Array.isArray(blocks.updates.dataConnectionNotes)) parsed.updates.dataConnectionNotes = blocks.updates.dataConnectionNotes;
        }
      }
      if (parsed.updates && parsed.updates.discoverActions) delete parsed.updates.discoverActions;
      const heuristicUpdates = extractHeuristicUpdates(userText);
      const aiUpdates = parsed.updates && Object.keys(parsed.updates).length
        ? { ...heuristicUpdates, ...parsed.updates }
        : heuristicUpdates;
      const hasAnyUpdates = Object.keys(aiUpdates || {}).length > 0;
      const trimmedOut = String(out || '').trim();
      const outLooksLikeJson = /^```json/i.test(trimmedOut) || (trimmedOut.startsWith('{') && trimmedOut.endsWith('}'));
      let aiReply = parsed.reply || (trimmedOut && !outLooksLikeJson ? trimmedOut : '');
      const lowSignalStructureReply = getWorkflowMode() === 'structure' && isLowSignalStructureReply(aiReply);
      const shouldFallback = !String(aiReply || '').trim() || (lowSignalStructureReply && !hasAnyUpdates);
      if (shouldFallback) {
        aiReply = getWorkflowMode() === 'discover'
          ? buildDiscoverFallbackReply(userText, aiUpdates)
          : buildStructureFallbackReply(userText, aiUpdates);
      }
      return { reply: aiReply, updates: aiUpdates, discoverActions: parsed.discoverActions || [] };
    }

    function animateCardToQuoteTray(cardEl) {
      const tray = document.getElementById('strategy-quote-tray');
      if (!cardEl || !tray) return;
      const source = cardEl.getBoundingClientRect();
      const target = tray.getBoundingClientRect();
      if (!source.width || !source.height || !target.width || !target.height) return;

      const ghost = cardEl.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = `${source.left}px`;
      ghost.style.top = `${source.top}px`;
      ghost.style.width = `${source.width}px`;
      ghost.style.height = `${source.height}px`;
      ghost.style.margin = '0';
      ghost.style.zIndex = '120';
      ghost.style.pointerEvents = 'none';
      ghost.style.transformOrigin = 'top left';
      ghost.style.transition = 'transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 420ms ease';
      document.body.appendChild(ghost);

      requestAnimationFrame(() => {
        const targetX = target.left + 8;
        const targetY = target.top + 8;
        const scale = Math.max(0.2, Math.min(0.5, target.width / Math.max(source.width, 1)));
        ghost.style.transform = `translate(${targetX - source.left}px, ${targetY - source.top}px) scale(${scale})`;
        ghost.style.opacity = '0.15';
      });

      window.setTimeout(() => {
        if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
      }, 460);
    }

        const card = actionBtn.closest('[data-module-card]');
        if (!card) return;
        const cardKey = card.getAttribute('data-module-card');
        if (!cardKey) return;
        const action = actionBtn.getAttribute('data-module-action');
        const snap = getModuleSnapshot(cardKey);

        if (action === 'quote') {
          setEmptyState(false);
          addQuotedModule({ key: cardKey, title: snap.title, summary: snap.summary });
          composeToStrategyInput('');
          animateCardToQuoteTray(card);
          return;
        }
        if (action === 'expand') {
          const collapsed = card.dataset.collapsed === '1';
          setModuleCardCollapsedState(card, !collapsed);
          return;
        }
        if (action === 'details') {
          openCanvasDetail(cardKey);
          return;
        }
        if (action === 'delete') {
          const ok = window.confirm(`Delete current content in "${snap.title}"? This cannot be undone.`);
          if (!ok) return;
          clearModuleState(cardKey);
        }
      });

      modal.addEventListener('click', (e) => {
        if (e.target.closest('[data-detail-close]')) closeCanvasDetail();
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeCanvasDetail();
      });
    }

    function setEmptyState(nextIsEmpty) {
      isEmptyState = nextIsEmpty;
      if (nextIsEmpty) isDemoPrefillMode = false;

      const modulePairs = [
        ['empty-state-view', 'workflow-view'],
        ['left-panel-empty-state', 'left-panel-workflow'],
        ['right-panel-empty-state', 'right-panel-workflow'],
        ['header-empty-state', 'header-workflow']
      ];

      const switchPair = (emptyId, workflowId, showEmpty) => {
        const empty = document.getElementById(emptyId);
        const workflow = document.getElementById(workflowId);
        if (!empty || !workflow) return;

        if (showEmpty) {
          workflow.style.opacity = '0';
          setTimeout(() => {
            workflow.classList.add('hidden');
            workflow.classList.remove('flex');
            empty.classList.remove('hidden');
            empty.classList.add('flex');
            void empty.offsetWidth;
            empty.style.opacity = '1';
          }, 300);
        } else {
          empty.style.opacity = '0';
          setTimeout(() => {
            empty.classList.add('hidden');
            empty.classList.remove('flex');
            workflow.classList.remove('hidden');
            workflow.classList.add('flex');
            void workflow.offsetWidth;
            workflow.style.opacity = '1';
          }, 300);
        }
      };

      modulePairs.forEach(([emptyId, workflowId]) => switchPair(emptyId, workflowId, isEmptyState));
      if (!isEmptyState) syncBlueprintCanvasVisibility();

      const leftSidebar = document.getElementById('left-sidebar');
      const leftShowBtn = document.getElementById('show-sidebar-btn');
      const rightSidebar = document.getElementById('right-sidebar');
      const showRightBtn = document.getElementById('show-right-sidebar-btn');
      if (leftSidebar) {
        leftSidebar.classList.toggle('hidden', isEmptyState);
        leftSidebar.classList.toggle('-translate-x-full', isEmptyState);
        leftSidebar.classList.toggle('pointer-events-none', isEmptyState);
        leftSidebar.classList.toggle('opacity-0', isEmptyState);
        if (leftShowBtn) leftShowBtn.classList.add('hidden');
      }
      if (rightSidebar) {
        rightSidebar.classList.toggle('hidden', isEmptyState);
        rightSidebar.classList.toggle('translate-x-full', isEmptyState);
        rightSidebar.classList.toggle('pointer-events-none', isEmptyState);
        rightSidebar.classList.toggle('opacity-0', isEmptyState);
        if (showRightBtn) showRightBtn.classList.add('hidden');
      }
      syncCanvasSafeArea();
      if (typeof window.__syncCanvasCursor === 'function') window.__syncCanvasCursor();

      // Keep the global left navigation sidebar available in all modes.
      const sidebarEmpty = document.getElementById('sidebar-empty-state');
      const sidebarWorkflow = document.getElementById('sidebar-workflow');
      if (sidebarEmpty && sidebarWorkflow) {
        sidebarEmpty.classList.add('hidden');
        sidebarEmpty.classList.remove('flex');
        sidebarWorkflow.classList.remove('hidden');
        sidebarWorkflow.classList.add('flex');
        sidebarWorkflow.style.opacity = '1';
      }

      applyWorkflowModeUI();

      const btnText = document.getElementById('empty-state-btn-text');
      const btn = document.querySelector('button[onclick="toggleEmptyState()"]');
      const btnIcon = btn ? btn.querySelector('i') : null;
      if (btnText) btnText.textContent = isEmptyState ? (isValidEdgeText(strategyState.edge) ? 'Enter Blueprint' : 'Discover') : 'Back to Discover';
      if (btnIcon) btnIcon.setAttribute('data-lucide', isEmptyState ? 'arrow-right' : 'compass');

      setTimeout(() => lucide.createIcons(), 50);
    }

    function toggleEmptyState() {
      if (isEmptyState && !isValidEdgeText(strategyState.edge)) {
        renderDiscoverCanvasState();
        return;
      }
      setEmptyState(!isEmptyState);
    }

    async function handleStrategySubmit(forceTransition = false) {
      const textarea = getActiveComposerTextarea();
      const submitBtn = document.getElementById('strategy-submit-btn');
      const hasInput = textarea && textarea.value.trim().length > 0;
      if (!forceTransition && !hasInput) return;
      if (!hasInput || isStrategyGenerating) return;
      
      const quotedContext = quotedModules.length
        ? quotedModules.map((item) => `[Quoted Module] ${item.title}: ${item.summary}`).join('\n')
        : '';
      const rawText = textarea.value.trim();
      const userText = quotedContext ? `${quotedContext}\n\n${rawText}` : rawText;
      textarea.value = '';
      textarea.style.height = 'auto';
      clearQuotedModules();
      strategyConversation.push({ role: 'user', content: userText });
      if (!isEmptyState && isDemoPrefillMode && !shouldSkipDiscoverIntent(userText) && !isGreetingLikeText(userText)) {
        isDemoPrefillMode = false;
      }

      if (isEmptyState && shouldSkipDiscoverIntent(userText)) {
        const demoUpdates = getDemoStructureBootstrapUpdates();
        const updatedModules = applyUpdatesAndCollectModules(demoUpdates);
        isDemoPrefillMode = true;
        strategyConversation.push({
          role: 'assistant',
          content: 'Done. I skipped Discover and prefilled a demo strategy so you can view the full Blueprint automation flow now.',
          updatedModules
        });
        setEmptyState(false);
        renderStrategyChat();
        renderNextActions();
        setTimeout(() => lucide.createIcons(), 50);
        return;
      }

      strategyConversation.push({ role: 'assistant', content: 'Thinking...', updatedModules: [] });
      renderStrategyChat();
      isStrategyGenerating = true;
      if (submitBtn) submitBtn.disabled = true;
      try {
        const ai = await callStrategyAI(userText);
        const updatedModules = applyUpdatesAndCollectModules(ai.updates);
        const previousAssistant = [...strategyConversation].slice(0, -1).reverse().find((m) => m.role === 'assistant' && m.content)?.content || '';
        const repeatedReply = normalizeReplyForCompare(ai.reply)
          && normalizeReplyForCompare(ai.reply) === normalizeReplyForCompare(previousAssistant)
          && updatedModules.length === 0;
        const finalReply = repeatedReply
          ? (getWorkflowMode() === 'structure'
            ? buildStructureFallbackReply(userText, ai.updates || {})
            : buildDiscoverFallbackReply(userText, ai.updates || {}))
          : ai.reply;
        strategyConversation[strategyConversation.length - 1] = { role: 'assistant', content: finalReply, updatedModules, discoverActions: ai.discoverActions || [] };
      } catch (err) {
        strategyConversation[strategyConversation.length - 1] = { role: 'assistant', content: `Request failed: ${err.message}`, updatedModules: [] };
      } finally {
        isStrategyGenerating = false;
        if (submitBtn) submitBtn.disabled = false;
        renderStrategyChat();
        renderNextActions();
        setTimeout(() => lucide.createIcons(), 50);
      }
    }

    // Canvas panning and zooming
    
    // --- Dynamic Component Loader ---
    async function loadComponent(id, url) {
      try {
        const response = await fetch(url);
        if (response.ok) {
          const html = await response.text();
          const target = document.getElementById(id);
          if (target) {
            target.outerHTML = html;
          }
        }
      } catch (err) {
        console.error('Error loading ' + url, err);
      }
    }

    async function initApp() {
      await Promise.all([
        loadComponent('sidebar-placeholder', './components/sidebar.html'),
        loadComponent('header-placeholder', './components/header.html'),
        loadComponent('left-panel-placeholder', './components/left-panel.html'),
        loadComponent('canvas-placeholder', './components/canvas.html'),
        loadComponent('right-panel-placeholder', './components/right-panel.html')
      ]);
      
      // Re-initialize icons and event listeners AFTER DOM is fully injected
      lucide.createIcons();
      renderDiscoverAttachments();
      initDiscoverEvents();
      initCanvasEvents();
      initBlueprintModuleInteractions();
      initDialogueEvents();
      applyStrategyStateToCenter();
      applyStrategyStateToRight();
      setTopbarStage();
      renderStrategyChat();
      refreshAIModelBadge();
      
      // Initialize state
      setEmptyState(true);
      scheduleDiscoverComposerPositionUpdate(true);
      setTimeout(() => scheduleDiscoverComposerPositionUpdate(true), 120);
      if (document.fonts?.ready) {
        document.fonts.ready.then(() => scheduleDiscoverComposerPositionUpdate(true));
      }
      if (!window.__discoverResizeBound) {
        window.__discoverResizeBound = true;
        window.addEventListener('resize', () => {
          if (getWorkflowMode() === 'discover') {
            scheduleDiscoverComposerPositionUpdate();
            renderDiscoverCanvasState();
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', initApp);

    function initCanvasEvents() {
      const container = document.getElementById('canvas-container');
      const content = document.getElementById('canvas-content');

      if(!container || !content) return;
      syncCanvasSafeArea();

      container.style.cursor = 'default';
      container.style.overflowY = 'auto';
      container.style.overflowX = 'hidden';
      content.style.transformOrigin = 'top center';
      content.style.transform = 'scale(1)';

      // Keep cursor consistent when mode changes
      const syncCursor = () => {
        container.style.cursor = 'default';
      };
      window.__syncCanvasCursor = syncCursor;
      syncCursor();
   
    }

    function initDialogueEvents() {
      const textareas = [document.getElementById('discover-input'), document.getElementById('strategy-input')].filter(Boolean);
      textareas.forEach((textarea) => {
        if (textarea.dataset.bound === '1') return;
        textarea.dataset.bound = '1';

        const autoResize = () => {
          textarea.style.height = 'auto';
          const minHeight = 56;
          const maxHeight = 240;
          const nextHeight = Math.max(minHeight, Math.min(maxHeight, textarea.scrollHeight));
          textarea.style.height = `${nextHeight}px`;
          textarea.style.overflowY = textarea.scrollHeight > maxHeight ? 'auto' : 'hidden';
        };

        textarea.addEventListener('input', autoResize);
        // Initial resize
        autoResize();

        textarea.addEventListener('keydown', (e) => {
          if (e.key === 'Tab' && textarea.dataset.composeTemplate === '1') {
            e.preventDefault();
            jumpComposePlaceholder(textarea, e.shiftKey);
            return;
          }
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleStrategySubmit();
            // Reset height happens in handleStrategySubmit, but safeguard here too
            setTimeout(() => { textarea.style.height = 'auto'; }, 0);
          }
        });
      });
    }
    </script>
