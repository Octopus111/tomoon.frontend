<!-- Header -->
<header class="relative h-16 bg-[#fff] dark:bg-[#0f1419] border-b border-slate-200 dark:border-dark-border shrink-0 z-30 transition-colors duration-300">
  <div id="header-empty-state" class="hidden h-full px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 flex items-center justify-center">
        <i data-lucide="sparkles" class="w-4 h-4"></i>
      </div>
      <div>
        <p class="text-sm font-semibold text-slate-800 dark:text-slate-100">AI Strategy Builder</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">Start by describing your strategy idea</p>
      </div>
    </div>
    <button onclick="toggleTheme()" class="theme-toggle p-1.5 text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm" title="Toggle theme">
      <i data-lucide="moon" class="w-4 h-4 text-slate-500 hidden dark:block"></i>
      <i data-lucide="sun" class="w-4 h-4 text-slate-500 block dark:hidden"></i>
    </button>
  </div>

  <div id="header-workflow" class="flex h-full items-center justify-between px-6">
    <!-- Extended Topbar Stepper Tab -->
    <div class="absolute top-[100%] left-1/2 -translate-x-1/2 w-[700px] h-[52px] bg-[#fff] dark:bg-[#0f1419] border-b border-x border-slate-200 dark:border-dark-border rounded-b-[1.75rem] z-10 transition-colors duration-300 pointer-events-none -mt-[1px]">
      <div class="absolute -top-[2px] left-[1px] right-[1px] h-[4px] bg-[#fff] dark:bg-[#0f1419]"></div>
    </div>

    <div class="absolute top-[70px] left-1/2 -translate-x-1/2 w-full max-w-[600px] flex items-center justify-between px-2 z-20 pointer-events-auto">
      <div class="absolute top-1/2 left-8 right-8 h-[2px] bg-slate-100 dark:bg-slate-700/50 -translate-y-1/2 z-[-1]"></div>
      <div class="absolute top-1/2 left-8 h-[2px] bg-gradient-to-r from-emerald-400 to-purple-500 w-[50%] -translate-y-1/2 z-[-1]"></div>
      <div class="relative z-10 flex items-center gap-1.5 px-3 py-1 bg-slate-50 dark:bg-[#101a2b] border border-slate-200 dark:border-slate-700 rounded-full cursor-pointer hover:bg-slate-100 dark:hover:bg-[#15233a] transition-colors">
        <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>
        <span class="text-xs font-semibold text-slate-700 dark:text-slate-200">Discover</span>
      </div>
      <div class="relative z-10 flex items-center gap-1.5 px-4 py-1.5 bg-purple-50 dark:bg-[#2b1a3f] rounded-full border border-purple-100 dark:border-purple-700 shadow-sm pointer-events-auto">
        <span class="relative flex h-2.5 w-2.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-purple-500 border border-white dark:border-[#0f1419]"></span>
        </span>
        <span class="text-xs font-semibold text-purple-700 dark:text-purple-400">Blueprint</span>
      </div>
      <div class="relative z-10 flex items-center gap-1.5 px-3 py-1 bg-slate-50 dark:bg-[#101a2b] border border-slate-200 dark:border-slate-700 rounded-full cursor-pointer hover:bg-slate-100 dark:hover:bg-[#15233a] transition-colors group">
        <i data-lucide="line-chart" class="w-4 h-4 text-slate-400 group-hover:text-purple-500 transition-colors"></i>
        <span class="text-xs font-medium text-slate-500 group-hover:text-purple-600 dark:text-slate-400 dark:group-hover:text-purple-400 transition-colors">Backtest</span>
      </div>
    </div>

    <div class="flex items-center space-x-6 relative z-30">
      <div class="flex items-center">
        <span class="font-bold text-slate-800 dark:text-slate-100 flex items-center text-[17px] tracking-tight">
          ToMoon
          <span class="text-slate-400 dark:text-slate-500 font-normal ml-2 text-[15px]">AI Strategy Builder</span>
        </span>
      </div>

      <div class="flex items-center space-x-3 pr-4">
        <button class="flex items-center text-slate-800 dark:text-slate-200 hover:text-purple-600 dark:hover:text-purple-400 transition-colors font-semibold text-[15px] group">
          <i data-lucide="chevron-left" class="w-4 h-4 text-slate-400 group-hover:text-purple-500 mr-1.5 transition-colors"></i>
          Gold Breakout Strategy
        </button>

        <div class="flex items-center px-2 py-0.5 bg-orange-50 dark:bg-[#2A1A15] border border-orange-100 dark:border-orange-900/30 text-orange-600 dark:text-[#FF8D4E] rounded text-xs font-medium shadow-sm">
          <span class="w-1.5 h-1.5 rounded-full bg-orange-500 dark:bg-[#FF8D4E] mr-1.5 animate-pulse"></span>
          Drafting
        </div>
      </div>
    </div>

    <div class="flex items-center space-x-2.5 text-sm relative z-30">
      <button onclick="toggleEmptyState()" class="flex items-center px-3.5 py-1.5 font-medium text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all shadow-sm group">
        <i data-lucide="eraser" class="w-4 h-4 mr-2 text-slate-400 group-hover:text-rose-500 transition-colors"></i> <span id="empty-state-btn-text">Empty State</span>
      </button>
      <button class="flex items-center px-3.5 py-1.5 font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm">
        <i data-lucide="save" class="w-4 h-4 mr-2 text-slate-400"></i> Save Draft
      </button>
      <button class="flex items-center px-3 py-1.5 font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm">
        v0.6 <i data-lucide="chevron-down" class="w-3.5 h-3.5 ml-1 text-slate-400"></i>
      </button>
      <button class="p-1.5 text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm">
        <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
      </button>
      <button class="p-1.5 text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm">
        <i data-lucide="share" class="w-4 h-4 text-slate-500"></i>
      </button>
      <button onclick="toggleTheme()" class="theme-toggle p-1.5 text-slate-600 dark:text-slate-300 bg-white dark:bg-transparent border border-slate-200 dark:border-dark-border rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all shadow-sm" title="Toggle theme">
        <i data-lucide="moon" class="w-4 h-4 text-slate-500 hidden dark:block"></i>
        <i data-lucide="sun" class="w-4 h-4 text-slate-500 block dark:hidden"></i>
      </button>
      <div class="ml-2 pl-2 border-l border-slate-200 dark:border-dark-border flex items-center">
        <img src="https://i.pravatar.cc/150?img=47" alt="User Profile" class="w-7 h-7 rounded-full border border-slate-200 dark:border-dark-border cursor-pointer object-cover shadow-sm hover:ring-2 hover:ring-purple-400 transition-all" />
      </div>
    </div>
  </div>
</header>
